          gunslinger</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#spellslinger]{Spellslinger}</p></td><td><p>Fires
          spells as well as bullets in deadly
          bombardments</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#trick-shot]{Trick
