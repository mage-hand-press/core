          kill</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#space-cowboy]{Space
