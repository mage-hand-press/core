  - sort: 1100000
    name: Weapon Descriptions
    type: text
    _id: mhpWeaponDescrip
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Many of the weapons on the Firearm tables, such as Muskets, Revolvers, and Double-Barrel
        Shotguns, are common fixtures in action movies and the real world. Some of the less obvious
        firearms and all of the futuristic blasters are detailed
        below.</span></p><p><em><strong>Antimatter Carbine.</strong></em> A more lethal model of the
        Standard Carbine, this rifle can automatically fire bolts of antimatter with surprising
        accuracy.</span></p><p><em><strong>Antimatter Pistol.</strong></em> A compact,
        antimatter-firing companion to the Antimatter Carbine, the Antimatter Pistol is an essential
        close-quarters backup.</span></p><p><em><strong>Avia-Ra Sunstaff.</strong></em> This long
        staff, forked at its end near a prominent gemstone, is a blaster in its own right. When used
        in expert hands, the Sunstaff can bludgeon, trip, and strike foes as a Quarterstaff, only to
        be squeezed in both hands to fire a burst of hot plasma</span></p><p><em><strong>Blitz
        Cannon.</strong></em> With its imposing rectangular muzzle, this brutalist weapon has a
        clear right and wrong end. Pulling its trigger unleashes a torrent of lightning bolts in a
        wide, imprecise spray, making it extremely dangerous at point-blank
        range.</span></p><p><em><strong>Bolt Caster.</strong></em> An early but reliable blaster
        design that resembles a crossbow, the Bolt Caster issues single shots of plasma with a long
        cooldown between shots.</span></p><p><em><strong>Cannon.</strong></em> Smoothbore,
        muzzleloading Cannons are common fixtures on pirate ships and defensive fortifications,
        capable of splintering wood and reducing stone to gravel with a thunderous boom. Larger
        siege weapons of this type exist, and require entire teams of operators to position, load,
        and fire.</span></p><p><em><strong>Concussion Rifle.</strong></em> A series of arcane
        capacitors run the length of this rifle, terminating in a thick condenser that compresses
        its blast into a precise burst. A Concussion Rifle is especially deadly at long ranges, and
        its damage bypasses most energetically-resistant armor.</span></p><p><em><strong>Dueling
        Laser.</strong></em> A pistol intended for honorable, one-on-one duels, the Dueling Laser
        fires a blinding streak of </span>light and promptly overheats. Spacers favor a Dueling
        Laser in their offhand for an infrequent but powerful retort.</span></p><p><em><strong>Ion
        Cannon.</strong></em> The Ion Cannon fires a bright, diffuse cone, rendering it deadly up
        close. Between shots, it makes a quiet zipping noise, as the arcane battery charges the ion
        cell for another blast.</span></p><p><em><strong>Magnus.</strong></em> This impressive
        handgun weighs almost twice that of a Repeater. Its infamous heft, recoil, and stopping
        power make it a favorite of spacers that accept no
        compromises.</span></p><p><em><strong>Parlor Gun.</strong></em> The smallest usable firearm,
        a Parlor Gun can be tucked into a stocking or hidden down a sleeve for two barrels of
        point-blank fire.</span></p><p><em><strong>Phaser.</strong></em> Phasers aren’t designed for
        effectiveness so much as portability and non-lethality. These blasters are often issued to
        peace-keepers and emissaries that require personal defense but have no intent to
        kill.</span></p><p><em><strong>Pistol.</strong></em> The earliest type of one-handed
        firearm, a Pistol operates as a miniature Musket, loading and firing a single heavy
        projectile with deadly results.</span></p><p><em><strong>Plasma Launcher.</strong></em> This
        short tube launches an orb of superheated plasma in an arc. On contact, the ball of plasma
        pops like a balloon, exploding in a dazzling fireball of
        sparks.</span></p><p><em><strong>REC Gun.</strong></em> The Revolving Exothermic Cannon (or
        REC gun, for short) operates on the same principle as a conventional blaster, with an arcane
        battery hooked up to an aperture barrel and so forth, but mounts several blasters on a
        revolving cylinder and fires each in rapid succession. A tripod mount keeps the blaster
        stable despite its heft and shocking
        recoil.</span></p><p><em><strong>Repeater.</strong></em> The quintessential handheld
        blaster, the Repeater is a staple on the Galactic Frontier. Solid, reliable, and packing
        just enough firepower to bring down an assailant, nearly every explorer worth their salt has
        one of these blasters strapped to their hip.</span></p><p><em><strong>Standard
        Carbine.</strong></em> As its name might suggest, the Standard Carbine is the standard-issue
        blaster for all Hegemony and Coalition troops, which makes it one of the most pervasive
        weapons in the ‘Verse. Spacers of all stripes employ it for its compact size and superb
        accuracy.</span></p><p><em><strong>Swarm Pistol.</strong></em> This handheld blaster, styled
        much like a Repeater, has a wickedly fast automatic fire, capable of spewing dozens of rays
        in seconds. Dexterous users might even find it possible to use one in each hand for a
        dazzling spectacle of plasma bolts.</span></p><h2>Firearm Ammunition</h2><p>Ammunition is
        required by a weapon that has the Ammunition property. A weapon’s description specifies the
        type of ammunition used by the weapon. The following Ammunition table lists new types of
        ammunition used by firearms and the amount you get when you buy them.</span></p><p>Firearm
        ammunition is destroyed upon
        use.</span></p><p></p><table><tbody><tr><td><p><strong>Type</strong></p></td><td><p><strong>Amount</strong></p></td><td><p><strong>Weight</strong></p></td><td><p><strong>Cost</strong></p></td></tr><tr><td><p>@UUID[Compendium.dnd5e.equipment24.Item.phbamoBulletsFir]{Bullets}</p></td><td><p>10</p></td><td><p>1
        ½ lb.</p></td><td><p>3
        GP</p></td></tr><tr><td><p>@UUID[Compendium.mage-hand-press-complete-gunslinger.equipment24.Item.mhpCannonballs00]{Cannonballs}</p></td><td><p>5</p></td><td><p>10
        lb.</p></td><td><p>25
        GP</p></td></tr><tr><td><p>@UUID[Compendium.mage-hand-press-complete-gunslinger.equipment24.Item.mhpFlares0000000]{Flares}</p></td><td><p>5</p></td><td><p>5
        lb.</p></td><td class="td1"><p>5
        GP</p></td></tr><tr><td><p>@UUID[Compendium.mage-hand-press-complete-gunslinger.equipment24.Item.mhpGrenades00000]{Grenades}</p></td><td><p>5</p></td><td><p>3
