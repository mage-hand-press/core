  - sort: 1200000
    name: New Feats
    type: text
    _id: mhpNewFeats00000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>This section offers a collection of new feats, which are special features not tied to a
        character class. A feat represents a talent or an area of expertise that gives a character
        special capabilities. It embodies training, experience, and abilities beyond what a class
        provides.</span></p><h2>Blaster Master</span></h2><p class="p3"><em>General Feat
        (Prerequisite: Level 4+, Dexterity 13+)</em></span></p><p>You gain the following
        benefits:</span></p><p><em><strong>Ability Score Increase.</strong></em> Increase your
        Dexterity score by 1, to a maximum of 20.</span></p><p><em><strong>Blaster
        Roulette.</strong></em> If you roll the same number of two damage dice for a weapon with the
        Firearm property, you deal bonus damage equal to that number. You can only add this bonus
        damage once per turn.</span></p><p><em><strong>Ignore Cooldown.</strong></em> You ignore the
        Cooldown property of weapons.</span></p><p><em><strong>Run and Gun.</strong></em> When you
        take the Dash or Disengage action, you can make a ranged attack using a weapon as a Bonus
        Action.</span></p><h2>Iron Hero</span></h2><p class="p3"><em>General Feat (Prerequisite:
        Level 4+)</em></span></p><p>You gain the following
        benefits.</span></p><p><em><strong>Ability Score Increase.</strong></em> Increase your
        Strength or Dexterity score by 1, to a maximum of 20.</span></p><p><em><strong>Underdog’s
        Resolve.</strong></em> When you are attacked by a creature that has a CR higher than your
        character level, you gain a +2 bonus to your Armor Class for that
        attack.</span></p><p><em><strong>Vengeful Strike.</strong></em> You have Advantage on attack
        rolls against any creature that has reduced one of your allies to 0 Hit Points since the end
        of your last turn.</span></p><p><em><strong>Heroic Intervention.</strong></em> When an enemy
        you can see takes a Legendary Action, you can take a Reaction to intercede, preventing the
        Legendary Action from happening. You can take this Reaction a number of times equal to your
        Proficiency Bonus and regain all expended uses when you finish a Short or Long
        Rest</span></p><h2>Marksman’s Luck</span></h2><p class="p3"><em>General Feat (Prerequisite:
        Level 4+, Dexterity 13+)</em></span></p><p>You gain the following
        benefits.</span></p><p><em><strong>Ability Score Increase.</strong></em> Increase your
        Dexterity score by 1, to a maximum of 20.</span></p><p><em><strong>Flip Die.</strong></em>
        Once per turn, when you roll for damage with a Ranged weapon, you can flip one of the damage
        dice over and use the number on the bottom. You can’t use this ability on d4s. Note that for
        a balanced die, the top and bottom numbers add up to one more than the die’s largest
        number.</span></p><p><em><strong>Enhanced Critical.</strong></em> When you score a Critical
        Hit with a Ranged weapon, the target’s Speed is 0 until the end of its next
        turn.</span></p><h2>Gun-Mage Adept</span></h2><p class="p3"><em>General Feat (Prerequisites:
        Level 4+, Spellcasting or Pact Magic Feature)</em></span></p><p>You gain the following
        benefits.</span></p><p><em><strong>Ability Score Increase.</strong></em> Increase your
        Dexterity by 1, to a maximum of 20.</span></p><p><em><strong>Ranged Weapon
        Proficiency.</strong></em> You gain proficiency with Ranged Martial
        weapons.</span></p><p><em><strong>Cantrip.</strong></em> You learn the <em>Finger Guns
        </em>cantrip.</span></p><p><em><strong>Expanded Spell List.</strong></em> The following
        spells are added to your spell list:
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpAntiballistic]{Antiballistics
        Field}</em>,
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpBallisticSmit]{Ballistic
        Smite}</em>,
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpConjureCannon]{Conjure
        Cannonball}</em>,
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpConjureCover0]{Conjure
        Cover}</em>,
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpJamWeapon0000]{Jam
        Weapon}</em>,
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpJethrosInstan]{Jethro's
        Instant Reload}</em>, and
        <em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells24.Item.mhpPerforatingSh]{Perforating
        Shot}</em>.</span></p><p><em><strong>Spells Prepared.</strong></em> Choose a number of
        spells equal to your Proficiency Bonus from among those in the Expanded Spell List benefit.
        You always have these spells prepared. Whenever you gain a new level, you can replace one of
        these spells with a different spell from the Expanded Spell List.</span></p>
