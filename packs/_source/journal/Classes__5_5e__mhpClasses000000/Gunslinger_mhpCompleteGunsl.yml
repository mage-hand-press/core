        ½ lb.</p></td><td><p>5
        GP</p></td></tr><tr><td><p>@UUID[Compendium.mage-hand-press-complete-gunslinger.equipment24.Item.mhpShot000000000]{Shot}</p></td><td><p>10</p></td><td><p>2
        lb.</p></td><td><p>1 GP</p></td></tr></tbody></table>
