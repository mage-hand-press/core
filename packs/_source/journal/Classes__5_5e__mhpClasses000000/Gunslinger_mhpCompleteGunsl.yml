  - sort: -100000
    name: Gunslinger
    type: class
    _id: mhpGunslinger000
    system:
      item: Compendium.mage-hand-press-core.classes24.Item.mhpGunslinger000
      description:
        value: >-
          <p>Risk is in a Gunslinger’s blood. They are bold renegades, bucking tradition and forging
          a new path with dangerous and inelegant firearms. Gunslingers are infamous for surviving
          by their wits and relying on split-second timing and a considerable amount of luck to
          survive.</span></p><h2>Guts and Gunpowder</h2><p>Black powder isn’t for the faint of
          heart. Its thunderous applause is volatile and imprecise—a barely controlled explosion
          directed at an enemy. Only the truly fearless seek to master it. But Gunslingers have
          nerves of steel, hurling death from their guns in a roaring cacophony. Adapted for
          shootouts, gunslingers are mobile and daring, knowing that life or death hangs on snap
          decision-making and one’s own mettle.</span></p><h2>Dangerous Outsiders</h2><p>A
          Gunslinger’s explosive lifestyle lends well to wandering and adventuring. Gunslingers
          often shoot first and ask questions later, an attitude which earns them few friends and
          bountiful enemies. In their travels, most gunslingers are secretive and take great lengths
          to go unnoticed, lest they be spotted by old foes with scores to
          settle.</span></p><h2>Becoming a Gunslinger…</h2><h3>As a Level 1
          Character</span></h3><ul><li><p class="p4">Gain all of the traits in the Core Gunslinger
          Traits table.</span></p></li><li><p class="p4">Gain the Gunslinger’s level 1 features,
          which are listed in the Gunslinger Features table.</span></p></li></ul><h3>As a Multiclass
          Character</span></h3><ul><li><p class="p4">Gain the following traits from the Core
          Gunslinger Traits table: Hit Point Die, and proficiency with Martial Ranged
          weapons.</span></p></li><li><p class="p4">Gain the Gunslinger’s level 1 features, which
          are listed in the Gunslinger Features table.</span></p></li></ul>
        additionalHitPoints: ''
        additionalTraits: ''
        additionalEquipment: ''
        subclass: >-
          <p>A Gunslinger subclass is a specialization that grants you features at certain levels,
          as specified in the subclass.</span></p><table><thead><tr><td colspan="2"><p>Gunslinger
          Subclasses</p></td></tr></thead><tbody><tr><td><p><strong>Name</strong></p></td><td><p><strong>Description</strong></p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#big-game-hunter]{Big
          Game Hunter}</p></td><td><p>Hunt colossal game with even bigger
          guns</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#deadeye]{Deadeye}</p></td><td><p>A
          precise, eagle-eyed
          marksman</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#grenadier]{Grenadier}</p></td><td><p>Uses
          explosive munitions to solve basically every
          problem</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#gun-tank]{Gun
          Tank}</p></td><td><p>Lugs around heavy mounted
          firearms</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#gun-ko-master]{Gun-Ko
          Master}</p></td><td><p>A martial artist who uses the gun as a total
          weapon</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#high-roller]{High
          Roller}</p></td><td><p>Gambles with their life and fortune; no risk is too
          high</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#laserist]{Laserist}</p></td><td><p>Tinkerer
          specializing in high-tech blaster
          weapons</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#musketeer]{Musketeer}</p></td><td><p>A
          musket-and-rapier-wielding soldier of honor and
          courage</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#pistolero]{Pistolero}</p></td><td><p>Fires
          six-shooters from the hip at incredible
          speed</p></td></tr><tr><td><p>@UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.GlFM7qyXaeGxQxHc#secret-agent]{Secret
