  - sort: 1300000
    name: New Spells
    type: text
    _id: mhpNewSpells0000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>This section contains the descriptions of spells that are new and available to all
        classes. The class spell lists detailed with each spell include other classes from Mage Hand
        Press, including the Necromancer, Martyr, and Investigator.</span></p><h2>Spell
        Descriptions</h2><p>New spells are presented in alphabetical
        order.</span></p><h3>Antiballistics Field</span></h3><p class="p4"><em>Level 6 Abjuration
        (Cleric, Necromancer, Wizard)</em></span></p><p class="p5"><strong>Casting Time:</strong>
        Action</span></p><p class="p5"><strong>Range:</strong> Self</span></p><p
        class="p5"><strong>Components:</strong> V, S, M (a pinch of wet gunpowder)</span></p><p
        class="p5"><strong>Duration:</strong> Concentration, up to 10 minutes</span></p><p>A 40-foot
        Emanation extends from you, disrupting projectiles and causing Ranged weapons to
        malfunction. Within the Emanation, whenever a Ranged weapon is used for an attack, the
        weapon immediately malfunctions and the attack is lost. A malfunctioning weapon can’t be
        used to make an attack until a creature takes the Utilize action to fix the weapon
        malfunction. Ranged attacks using weapons whose projectiles pass through the Emanation have
        Disadvantage and deal only half damage on a hit.</span></p><h3>Ballistic Smite</span></h3><p
        class="p4"><em>Level 1 Evocation (Paladin)</em></span></p><p class="p5"><strong>Casting
        Time:</strong> Bonus Action, which you take immediately after hitting a creature with a
        Ranged weapon</span></p><p class="p5"><strong>Range:</strong> Self</span></p><p
        class="p5"><strong>Components:</strong> V</span></p><p class="p5"><strong>Duration:</strong>
        Instantaneous</span></p><p>Choose Acid, Cold, Fire, Lightning, Poison, or Thunder damage.
        The target hit by the attack takes an extra 2d6 damage of the chosen type. The triggering
        attack can deal the chosen damage type or its normal damage type (your
        choice).</span></p><p><em><strong>Using a Higher-Level Spell Slot.</strong></em> The damage
        increases by 1d6 for each spell slot level above 1.</span></p><h3>Concealed
        Shot</span></h3><p class="p4"><em>Illusion Cantrip (Bard, Druid, Necromancer, Sorcerer,
        Warlock, Warmage, Wizard)</em></span></p><p class="p5"><strong>Casting Time:</strong>
        Action</span></p><p class="p5"><strong>Range:</strong> Touch</span></p><p
        class="p5"><strong>Components:</strong> S, M (a Ranged weapon)</span></p><p
        class="p5"><strong>Duration:</strong> 1 minute</span></p><p>A Ranged weapon you touch is
        made supernaturally subtle. For the duration, when you make a ranged attack using the
        weapon, the weapon or ammunition you’re using becomes invisible while in flight and the
        weapon becomes silent. If the weapon produces smoke or light, the spell suppresses these
        effects. The weapon or projectile you’re using becomes visible again after the attack hits
        or misses. If you are hidden and the target is 80 feet or further from you, the attack
        doesn’t reveal your location.</span></p><h3>Conjure Cannonball</span></h3><p
        class="p4"><em>Level 3 Conjuration (Sorcerer, Wizard)</em></span></p><p
        class="p5"><strong>Casting Time:</strong> Action</span></p><p
        class="p5"><strong>Range:</strong> 600 feet</span></p><p
        class="p5"><strong>Components:</strong> V, S, M (a small replica cannon)</span></p><p
        class="p5"><strong>Duration:</strong> Instantaneous</span></p><p>You summon a cannonball,
        mid-flight and at full velocity, which explodes on impact. Make a ranged spell attack roll
        </span><span class="s2">against a target you can see within range. On a hit, the target
        </span>takes 5d10 Bludgeoning damage and an explosion extends from it in a 5-foot Emanation.
        Each creature other than the </span><span class="s2">target within the Emanation makes a
        Dexterity saving throw, </span>taking half as much damage as the target on a failed
        save.</span></p><p><em><strong>Using a Higher-Level Spell Slot.</strong></em> The damage
        increases by 1d10 for each slot level above 3.</span></p><h3>Conjure Cover</span></h3><p
        class="p2"><em>Level 1 Conjuration (Druid, Investigator, Paladin, Sorcerer,
        Wizard)</em></span></p><p class="p3"><strong>Casting Time:</strong> Bonus
        Action</span></p><p class="p3"><strong>Range:</strong> 10 feet</span></p><p
        class="p3"><strong>Components:</strong> V, S, M (a duck figurine)</span></p><p
        class="p3"><strong>Duration:</strong> Concentration, up to 1 hour</span></p><p
        class="p4">You conjure a low cobblestone wall along the ground at a point you can see within
        range. The wall is 18 inches thick and is composed of three 5-foot-long, 3-foot-high
        segments. Each segment must be contiguous with at least one other segment.</span></p><p
        class="p4">A Medium creature that hunkers behind the wall has &amp;Reference[Half Cover],
        and a Small creature that hunkers behind it has &amp;Reference[Three-Quarters Cover]. The
        wall can be leapt over without spending any additional movement.</span></p><p
        class="p4">Each segment has AC 10 and 30 hit points. Reducing a segment of the wall to 0 hit
        points causes it to crumble, destroying it. The wall disappears when all the segments are
        destroyed or the spell ends.</span></p><h3>Finger Guns</span></h3><p
        class="p2"><em>Evocation Cantrip (Bard, Sorcerer, Warmage, Wizard)</em></span></p><p
        class="p3"><strong>Casting Time:</strong> Bonus Action</span></p><p
        class="p3"><strong>Range:</strong> Self</span></p><p class="p3"><strong>Components:</strong>
        V, S</span></p><p class="p3"><strong>Duration:</strong> 1 minute</span></p><p class="p4">You
        extend your forefinger and thumb, a dangerous gesture mimicking a gun. For the duration,
        your hand counts as a Simple Ranged weapon with a range of 60/240 feet and the Slow mastery
        property. You can use your spellcasting ability instead of Dexterity for the attack rolls of
        this weapon. On a hit, the weapon deals 2d6 Force damage and doesn’t add your ability
        modifier to damage.</span></p><p class="p4"><em><strong>Cantrip Upgrade.</strong></em> The
        weapon’s normal range increases by 30 feet and its long range increases by 120 feet when you
        reach levels 5 (90/360 feet), 11 (120/480 feet), and 17 (150/600 feet).</span></p><h3>Jam
        Weapon</span></h3><p class="p2"><em>Level 2 Transmutation (Bard, Witch,
        Wizard)</em></span></p><p class="p3"><strong>Casting Time:</strong> Reaction, which you take
        when a creature you can see within range makes an attack using a Ranged weapon</span></p><p
        class="p3"><strong>Range:</strong> 60 feet</span></p><p
        class="p3"><strong>Components:</strong> V, S, M (a pinch of wet gunpowder)</span></p><p
        class="p3"><strong>Duration:</strong> Instantaneous</span></p><p class="p4">The weapon you
        target suffers a malfunction and the attack fails. A malfunctioning weapon can’t be used to
        make an attack until a creature takes the Utilize action to fix the weapon
        malfunction.</span></p><h3>Jethro’s Instant Reload</span></h3><p class="p2"><em>Level 2
        Conjuration (Bard, Investigator, Ranger, Wizard)</em></span></p><p
        class="p3"><strong>Casting Time:</strong> Action</span></p><p
        class="p3"><strong>Range:</strong> Touch</span></p><p
        class="p3"><strong>Components:</strong> V, S, M (a spent bullet casing)</span></p><p
        class="p3"><strong>Duration:</strong> 8 hours</span></p><p class="p4">One Ranged weapon you
        touch becomes enchanted to reload itself automatically. If the weapon has the
        &amp;Reference[Cooldown],
        @UUID[Compendium.dnd5e.content24.JournalEntry.phbEquipment0000.JournalEntryPage.7qSj8lqMAP0FBNKK#loading]{Loading},
        or
        @UUID[Compendium.complete-gunslinger-2024.complete-gunslinger-2024.JournalEntry.rc9aVg7EzhPONArR.JournalEntryPage.I43I2xQoXIDsu1Nh]{Reload}
        property, you ignore the property for the duration. When the weapon’s ammunition is
        depleted, ammunition you are carrying teleports into the weapon.</span></p><h3>Perforating
        Shot</span></h3><p class="p2"><em>Level 1 Evocation (Martyr, Paladin,
        Ranger)</em></span></p><p class="p3"><strong>Casting Time:</strong> Bonus Action, which you
        take immediately after hitting or missing with a ranged attack using a weapon</span></p><p
        class="p3"><strong>Range:</strong> Self</span></p><p class="p3"><strong>Components:</strong>
        V</span></p><p class="p3"><strong>Duration:</strong> Instantaneous</span></p><p
        class="p4">As your attack hits or misses the target, the weapon or ammunition transforms
        into a 5-foot-wide Line of magical energy that extends out to the weapon’s normal range. The
        Line includes the attack’s original target. Each creature within the Line makes a Dexterity
        saving throw, taking Force damage equal to the weapon’s normal damage on a failed save or
        half as much damage on a successful one.</span></p><p class="p4"><em><strong>Using a
        Higher-Level Spell Slot.</strong></em> The weapon’s damage increases by 1d8 for each slot
        level above 1.</span></p>
