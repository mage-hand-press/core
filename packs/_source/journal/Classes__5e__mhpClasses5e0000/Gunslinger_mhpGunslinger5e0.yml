  - sort: 400000
    name: Eras
    type: text
    _id: mhpEras000000000
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Gunslingers are inseparably connected to their eras, as the implements of their trade
        have evolved throughout history and will continue to evolve into the far future. Whereas the
        earliest gunslingers used muskets and black powder, space-faring gunslingers fire high-tech
        blasters that never run low on ammunition. Both are gunslingers; equally brash and
        singularly dangerous.</p><p>In general terms, gunslingers can be organized into the
        following eras:</p><h3>Renaissance</h3><p>Renaissance-era firearms are the gun’s first steps
        away from heavy cannons and into portable rifles. Weapons from this era use musket balls and
        loose black powder, and therefore are slow to reload and prone to malfunction. Consequently,
        Renaissance-era gunslingers will be skilled in swords and cannons in addition to guns,
        making them fearsome foes, no matter the theater.</p><p>Such gunslingers are known to take
        to the sea in pirate vessels, participate in swashbuckling escapades in well-fortified
        castles, and engage in pistol duels for their honor, but few simply line up with their
        fellows and exchange musket fire.</p><p><span class="s2"><em><strong>Variant
        Deeds.</strong></em></span> With the GM’s permission, you can pick the following two Deeds
        in place of two of your normal Deeds, if you are in a setting that primarily uses
        Renaissance firearms.</p><h4>Grazing
        Shot</h4><p>@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpGrazingShot00
        inline]</p><h4>Reposition</h4><p>@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpReposition000
        inline]</p><h3>Industrial Age</h3><p class="p2">In the Industrial Age (concurrent with the
        Wild West of cowboys and locomotive travel), cartridged bullets and lever-action firearms
        accelerated the tempo of combat, even introducing the first automatic weapons. These guns
        lacked the clean assembly-line consistency of modern firearms, but laid down the bedrock for
        designs that have not changed much since: a classic six-shot revolver is as timeless as it
        is effective.</p><p class="p2">Gunslingers in the Industrial Age fought in legendarily
        bloody wars, trailblazed the frontier, formed gangs to rob trains by horseback, and had
        shootouts in saloons.</p><p class="p2"><span class="s2"><em><strong>Variant
        Deeds.</strong></em></span> With the GM’s permission, you can pick the following two Deeds
        in place of two of your normal Deeds, if you are in a setting that primarily uses Industrial
        Age firearms.</p><h4>Fancy Gunplay</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpFancyGunplay0
        inline]</p><h4>Maverick Spirit</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpMaverickSpiri
        inline]</p><h3>Modern</h3><p class="p2">Modern firearms have embraced automatic fire,
        ammunition magazines, and lighter caliber bullets (which travel at much higher speeds). For
        these guns, form begets function: weapons are designed for a specific role, such as sniper
        rifles for long range and shotguns for close quarters, and every aspect of their design
        supports this role. Moreover, weapons that enjoyed success in the West, such as the
        double-barrel shotgun, can still be found in use today.</p><p class="p2">Modern gunslingers
        can be gangsters wielding twin machine pistols, modern soldiers with assault rifles,
        assassins that prefer to snipe their targets from a safe distance, or covert spies,
        infiltrating a building with a pistol hidden in a phone.</p><p class="p2"><span
        class="s2"><em><strong>Variant Deeds.</strong></em></span> With the GM’s permission, you can
        pick the following two Deeds in place of two of your normal Deeds, if you are in a setting
        that primarily uses Modern firearms.</p><h4>Curved Trajectory</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpCurvedTraject
        inline]</p><h4>Take the Bullet</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpTakeBullet000
        inline]</p><h3>Futuristic</h3><p class="p2">Firearms of the future have only tenuous
        connections to the weapons of the past. Though they still retain the profile of handguns,
        shotguns, and assault rifles, futuristic firearms are powered by rechargeable arcane
        batteries (or power cells) and produce bursts of pure energy instead of bullets. Generally,
        these weapons are referred to as blasters and, though they never need to be reloaded, tend
        to be more expensive and more finicky than modern firearms. Blasters, for example, can
        overheat, and require a cooldown period before being used again.</p><p class="p2">Future
        gunslingers jet across the galaxy, with a blaster in hand and a song in their hearts.
        Others, however, see the potential of blasters as cutting-edge technology and attempt to
        optimize them to their limits.</p><p class="p2"><span class="s2"><em><strong>Variant
        Deeds.</strong></em></span> With the GM’s permission, you can pick the following two Deeds
        in place of two of your normal Deeds, if you are in a setting that primarily uses Futuristic
        firearms.</p><h4>Blindfire</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpBlindfire0000
        inline]</p><h4>Disguised Shot</h4><p
        class="p2">@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpDisguisedShot
        inline]</p><h3>Suggested Era</h3><p class="p2">Though some weapons can exist in any era
        (especially if the story demands an exotic firearm enter the fray), many are best suited to
        their own era. Gunslingers, too, will seem out of place if in the wrong era; a musketeer
        will probably not spend their holidays on their spaceship going to Mars, for example. The
        following table provides a suggested list of firearms and gunslingers for different eras and
        recommends different names for firearms that would otherwise seem out of
        place.</p><p>@Embed[Compendium.mage-hand-press-core.journal.JournalEntry.mhpEmbeds5e00000.JournalEntryPage.mhpEras000000000
        inline]</p>
