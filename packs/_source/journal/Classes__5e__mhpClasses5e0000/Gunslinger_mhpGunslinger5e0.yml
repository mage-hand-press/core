      description:
        value: >-
          <p>@Embed[Compendium.mage-hand-press-core.classes14.Item.mhpGunslinger000
          caption=false]</p><h3>Guts and Gunpowder</h3><p>Black powder is not for the faint of
          heart. Its thunderous applause is volatile and imprecise—a barely controlled explosion
          directed at an enemy. Only the truly fearless seek to master it, for one must be mad or
          have nerves of steel to weather the risk of its use. But those who call themselves
          gunslingers are fearless combatants, hurling death from their guns in a roaring cacophony.
          Adapted for shootouts, gunslingers are mobile and daring, knowing that life or death hangs
          on snap decision-making and one’s own mettle.</p><h3>Dangerous Outsiders</h3><p>A
          gunslinger’s explosive lifestyle lends well to wandering and adventuring. Gunslingers will
          often shoot first and ask questions later, an attitude which earns them few friends and
          bountiful enemies. In their travels, most gunslingers are secretive and take great lengths
          to go unnoticed, lest they be spotted by old foes with scores to settle.</p><p>Yet, their
          skills are not unneeded. Anyone requiring protection or revenge of their own can count on
          a gunslinger to be in need of an odd job when they roll into town. After all, skill with a
          gun is always in demand somewhere.</p><h3>Creating a Gunslinger</h3><p>When creating your
          gunslinger, consider where firearms fit in the campaign’s world and what the common
          perceptions are of those who use them. If firearms are the norm, your gunslinger might be
          a mercenary or militia fighter. If firearms are rare, your gunslinger might be one of a
          kind, a trailblazer in new types of warfare.</p><p>It’s also not unusual for a gunslinger
          to be haunted by their past. Did some event drive you to the gun and motivate you to
          travel? Is there a bounty on your head in one or more areas? Do you have any old enemies
          that seek you for revenge?</p><h4>Quick Build</h4><p>To make a gunslinger quickly, follow
          these suggestions. Make Dexterity and Constitution your highest ability scores. If you
          plan to choose the Gun Tank creed, instead make Strength your highest ability score.
          Lastly, choose any background, preferably one that emphasizes your familiarity with
          firearms and penchant for risk-taking.</p>
        additionalHitPoints: ''
        additionalTraits: <p>You also gain proficiency in simple and martial firearms.</p>
