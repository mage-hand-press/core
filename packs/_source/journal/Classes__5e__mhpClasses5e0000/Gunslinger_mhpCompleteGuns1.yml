  - sort: 500000
    name: Spells
    type: text
    _id: mhpSpells0000000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>In any world in which magic and firearms coexist, arcana has walked in lockstep with the
        evolution of combat, </span>adapting varyingly counter and augment the power of guns. Some
        spells have been crafted to specifically to cripple gunmen, such as the almost necessary
        spell, <em>jam weapon</em>. Other spells, such as <em>chromatic bullet</em>, add a tinge of
        arcana into gunplay, bringing spells and firearms closer together.</span></p><p>This chapter
        contains spells enjoyed by spellslingers, clerics, and wizards
        alike.</span></p><h2>Renaissance Tag</h2><p>To better organize these spells, the following
        spells include the Renaissance tag. This tag indicates that this spell is appropriate in
        campaigns with prevalent firearms and other emerging
        technologies.</span></p><table><tbody><tr><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpAntiballisti1]{Antiballistics
        Field}</em></p></td><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpFingerGuns001]{Finger
        Guns}</em></p></td></tr><tr><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpChromaticBull]{Chromatic
        Bullet}</em></p></td><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpJamWeapon0001]{Jam
        Weapon}</em></p></td></tr><tr><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpConcealedSho1]{Concealed
        Shot}</em></p></td><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpJethrosInsta1]{Jethro's
        Instant
        Reload}</em></p></td></tr><tr><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpConjureCanno1]{Conjure
        Cannonball}</em></p></td><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpPerforatingSm]{Perforating
        Smite}</em></p></td></tr><tr><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpConjureCover1]{Conjure
        Cover}</em></p></td><td><p><em>@UUID[Compendium.mage-hand-press-complete-gunslinger.spells14.Item.mhpProtectionfro]{Protection
        from Ballistics}</em></p></td></tr></tbody></table><h1><span class="s2">Spell
        Descriptions</span></h1><p>These spells are listed in alphabetical
        order.</span></p><h2>Antiballistics Field</span></h2><p class="p5"><em>6th-level abjuration
        (renaissance)</em></span></p><p class="p6"><strong>Casting Time:</strong> 1
        action</span></p><p class="p6"><strong>Range:</strong> Self (40-foot-radius
        sphere)</span></p><p class="p6"><strong>Components:</strong> V, S, M (a pinch of wet
        gunpowder)</span></p><p class="p6"><strong>Duration:</strong> Concentration, up to 10
        minutes</span></p><p>An invisible 40-foot-radius field of magic extends from you, disrupting
        bullets and causing firearms to malfunction. Within the sphere, attacks with firearms fail,
        and firearms used to make an attack immediately jam. A jammed firearm can’t be used to make
        an attack until a creature uses its action to clear the weapon
        malfunction.</span></p><p>Firearms outside the sphere which are fired into it have
        disadvantage on attack rolls, and deal only half damage on a successful
        hit.</span></p><h2>Chromatic Bullet</span></h2><p class="p5"><em>1st-level evocation
        (renaissance)</em></span></p><p class="p6"><strong>Casting Time:</strong> 1 bonus
        action</span></p><p class="p6"><strong>Range:</strong> Self</span></p><p
        class="p6"><strong>Components:</strong> V, S, M (a firearm)</span></p><p
        class="p6"><strong>Duration:</strong> Concentration, up to 1 minute</span></p><p>The next
        time you hit a creature with a ranged weapon attack using a firearm during the spell’s
        duration, your bullet sparks with elemental energy. The attack deals an extra 2d4 damage to
        the target. You choose whether this additional damage is acid, cold, fire, lightning,
        poison, or thunder damage, and you can choose to change the firearm’s damage to one of these
        damage types. You do not need to pick the same damage type for both.</span></p><p><span
        class="s3"><em><strong>At Higher Levels.</strong></em></span> When you cast this spell using
        a spell slot of 2nd level or higher, the damage increases by 2d4 for each slot level above
        1st.</span></p><h2>Concealed Shot</span></h2><p class="p5"><em>Illusion cantrip
        (renaissance)</em></span></p><p class="p6"><strong>Casting Time:</strong> 1
        action</span></p><p class="p6"><strong>Range:</strong> Self</span></p><p
        class="p6"><strong>Components:</strong> S, M (a ranged weapon)</span></p><p
        class="p6"><strong>Duration:</strong> Instantaneous</span></p><p>As part of the action used
        to cast this spell, you must make an attack with a ranged weapon, otherwise the spell fails.
        The attack’s projectile is invisible while in flight, and the weapon itself is silent. If
        the weapon is a firearm, this spell suppresses the smoke and light the weapon produces,
        making it impossible to see or hear where the shot came from.</span></p><p>This spell only
        conceals the first shot you make; any additional shots aren’t
        concealed.</span></p><h2>Conjure Cannonball</span></h2><p class="p3"><em>3rd level
        conjuration (renaissance)</em></span></p><p class="p4"><strong>Casting Time:</strong> 1
        action</span></p><p class="p4"><strong>Range:</strong> 600 feet</span></p><p
        class="p4"><strong>Components:</strong> V, S, M (a small replica cannon)</span></p><p
        class="p4"><strong>Duration:</strong> Instantaneous</span></p><p>You summon a cannonball,
        mid-flight and at full velocity, which explodes on impact. Make a spell attack roll against
        a target you can see within range. On a hit, the target takes 4d10 bludgeoning damage, and
        each creature within 5 feet of the target must make a Dexterity saving throw. On a failed
        save, a creature takes half as much damage.</span></p><p><span class="s2"><em><strong>At
        Higher Levels.</strong></em></span> When you cast this spell using a spell slot of 4th level
        or higher, the damage increases by 1d10 for each spell slot above 3rd.</span></p><h2>Conjure
        Cover</span></h2><p class="p3"><em>1st-level conjuration (ritual)
        (renaissance)</em></span></p><p class="p4"><strong>Casting Time:</strong> 1 bonus
        action</span></p><p class="p4"><strong>Range:</strong> 10 feet</span></p><p
        class="p4"><strong>Components:</strong> V, S, M (a duck figurine)</span></p><p
        class="p4"><strong>Duration:</strong> Concentration, up to 1 hour</span></p><p>You conjure a
        low cobblestone wall along the ground, a perfect source of cover, at a point you can see
        within range. The wall is 18 inches thick and is composed of three 5-foot long by 3-foot
        high segments. Each segment must be contiguous with at least one other
        segment.</span></p><p>A Medium creature that hunkers behind the wall has half cover from
        ranged attacks, and a Small creature that hunkers behind it has three-quarters cover from
        ranged attacks. A prone creature has total cover behind the wall. The wall can be leapt over
        without using any additional movement.</span></p><p>Each segment has AC 10 and 60 hit
        points. Reducing a segment of the wall to 0 hit points causes it to crumble, destroying it.
        The wall disappears when all the segments are destroyed or the spell
        ends.</span></p><h2>Finger Guns</span></h2><p class="p3"><em>Evocation cantrip
        (renaissance)</em></span></p><p class="p4"><strong>Casting Time:</strong> 1 bonus
        action</span></p><p class="p4"><strong>Range:</strong> Self</span></p><p
        class="p4"><strong>Components:</strong> V, S</span></p><p
        class="p4"><strong>Duration:</strong> 1 minute</span></p><p>You extend your forefinger and
        thumb, a dangerous gesture mimicking a gun. For the duration, you can use your action to
        make a ranged spell attack against one creature you can see within 60 feet of you, dealing
        1d8 force damage on a hit.</span></p><p>Your finger gun doesn’t require ammunition, but it
        is considered to be a firearm for spells and effects that apply to
        firearms.</span></p><p>The spell’s damage increases by 1d8 when you reach 5th level (2d8),
        11th level (3d8), and 17th level (4d8).</span></p><h2>Jam Weapon</span></h2><p
        class="p3"><em>2nd-level transmutation (renaissance)</em></span></p><p
        class="p4"><strong>Casting Time:</strong> 1 reaction, which you take when a creature you can
        see within range attacks with a firearm</span></p><p class="p4"><strong>Range:</strong> 60
        feet</span></p><p class="p4"><strong>Components:</strong> V, S, M (a pinch of wet
        gunpowder)</span></p><p class="p4"><strong>Duration:</strong> Instantaneous</span></p><p>The
        firearm you target jams upon firing. The attack fails, and the firearm is jammed. A jammed
        firearm can’t be used to make an attack until a creature uses its action to clear the weapon
        malfunction.</span></p><p><span class="s2"><em><strong>At Higher
        Levels.</strong></em></span> When you cast this spell using a spell slot of 3rd level or
        higher, you can jam one additional firearm within range for each slot level above
        2nd.</span></p><h2>Jethro’s Instant Reload</span></h2><p class="p3"><em>2nd-level
        conjuration (ritual) (renaissance)</em></span></p><p class="p4"><strong>Casting
        Time:</strong> 1 action</span></p><p class="p4"><strong>Range:</strong> Touch</span></p><p
        class="p4"><strong>Components:</strong> V, S, M (a spent bullet casing)</span></p><p
        class="p4"><strong>Duration:</strong> 1 hour</span></p><p>One ranged weapon you touch
        becomes enchanted to reload itself automatically. If the weapon has the Loading or Reload
        property, you can ignore this for the duration. When the weapon’s ammunition is depleted,
        new ammunition teleports from your person to your hand or into the weapon, as appropriate.
        If the weapon takes an action or longer to reload, it reloads itself at the end of your
        turn.</span></p><p>If you aren’t carrying sufficient ammunition for the weapon to reload,
        the spell ends.</span></p><h2>Perforating Smite</span></h2><p class="p3"><em>2nd-level
        evocation (renaissance)</em></span></p><p class="p4"><strong>Casting Time:</strong> 1 bonus
        action</span></p><p class="p4"><strong>Range:</strong> Self</span></p><p
        class="p4"><strong>Components:</strong> V</span></p><p class="p4"><strong>Duration:</strong>
        Concentration, up to 1 minute</span></p><p>The next time you make an attack with a firearm
        before this spell ends, the shot is charged with an incredible amount of power. Instead of
        making an attack roll against a single target, the shot becomes a 5-foot wide line that
        extends from you out to the weapon’s normal range. Each creature in that line must make a
        Dexterity saving throw. A creature takes the weapon’s normal damage on a failed save, or
        half as much damage on a successful one.</span></p><h2>Protection from
        Ballistics</span></h2><p class="p3"><em>2nd-level abjuration (renaissance)</em></span></p><p
        class="p4"><strong>Casting Time:</strong> 1 action</span></p><p
        class="p4"><strong>Range:</strong> Touch</span></p><p
        class="p4"><strong>Components:</strong> V, S</span></p><p
        class="p4"><strong>Duration:</strong> Concentration, up to 1 minute</span></p><p>A
        shimmering shield of energy surrounds one willing creature you touch. For the duration,
        ranged attacks made by firearms have disadvantage against the target, and the target has
        resistance to any damage dealt by firearms.</span></p>
