  - sort: 300000
    name: Feats
    type: text
    _id: mhpFeats00000000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>A feat represents a talent or an area of expertise that gives a character special
        capabilities. It embodies training, experience, and abilities beyond what a class
        provides.</span></p><p>At certain levels, your class gives you the Ability Score Improvement
        feature. Using the optional feats rule, you can forgo taking that feature to take a feat of
        your choice instead. You can take each feat only once, unless the feat’s description says
        otherwise.</span></p><p>You must meet any prerequisite specified in a feat to take that
        feat. If you ever lose a feat’s prerequisite, you can’t use that feat until you regain the
        prerequisite. For example, the Grappler feat requires you to have a Strength of 13 or
        higher. If your Strength is reduced below 13 somehow—perhaps by a withering curse—you can’t
        benefit from the Grappler feat until your Strength is
        restored.</span></p><h2>Blitzwarrior</h2><p class="p3"><em>Prerequisite: Proficiency with
        simple firearms</em></span></p><p>When you roll damage for a firearm with the Scatter
        property, you can reroll one of the damage dice, and must use the new roll. Additionally,
        being within 5 feet of a hostile creature doesn’t impose disadvantage on your ranged attack
        rolls.</span></p><h2>Bounty Hunter</h2><p>When there’s a price on someone’s head, you aim to
        collect. You gain the following benefits:</span></p><ul><li><p class="p4">Increase your
        Wisdom score by 1, to a maximum of 20.</span></p></li><li><p class="p4">You perfectly
        remember the name and face of every person you’ve ever met.</span></p></li><li><p
        class="p4">You can use your action to mark a creature you can see within 120 feet of you for
        1 hour. You have advantage on any Wisdom (Perception) or Wisdom (Survival) checks you make
        to find the marked creature. Additionally, as long as the creature is marked, you can
        discern whether or not the creature has passed through a location. You can have only one
        creature marked at a time.</span></p></li><li><p class="p4">Whenever you reduce a creature
        to 0 hit points with any attack you make or spell that you cast, you can choose to knock the
        creature out instead of killing it.</span></p></li></ul><h2>Gun-Mage Adept</h2><p
        class="p3"><em>Prerequisites: Spellcasting feature or Pact Magic
        feature</em></span></p><p>You’ve learned how to meld subtle arcana with the brute force of a
        firearm, gaining the following benefits:</span></p><ul><li><p class="p4">You gain
        proficiency with four simple or martial firearms of your choice. You can use a firearm as a
        spellcasting focus.</span></p></li><li><p class="p4">All spells with the renaissance tag are
        added to your class’s spell list, if they are a level for which your class gets spell slots.
        Use your spellcasting ability for these spells.</span></p></li><li><p class="p4">You learn
        either the <em>concealed shot </em>or <em>finger guns </em>cantrip, your choice, which
        doesn’t count against your total number of cantrips known.</span></p></li><li><p
        class="p4">You learn four spells of your choice that you cast with the renaissance tag. If
        you prepare spells, these spells are always prepared for you and don’t count against the
        number of spells you can prepare each day. If you are a wizard, they are added to your
        spellbook instantly at no cost. If you learn spells, these spells do not count against your
        total number of spells known. When you gain a level in your spellcasting class, you can
        replace one of these spells with another spell with the renaissance tag for which you have
        spell slots.</span></p></li></ul><h2>Iron Hero</h2><p>You have resolved yourself to save the
        day when all hope seems lost. You gain the following benefits:</span></p><ul><li><p
        class="p4">When you are attacked by a creature that has a CR higher than your level, you
        gain a +2 bonus to your Armor Class.</span></p></li><li><p class="p4">You have
        <strong>advantage</strong> on attack rolls against any creature that has reduced one of your
        allies to 0 hit points in the last round.</span></p></li><li><p class="p4">If a hostile
        creature you can see takes a legendary action, you can use your reaction to intercede,
        preventing the legendary action from happening. Once you use this ability, you can’t use it
        again until you finish a short or long rest.</span></p></li></ul><h2>Marksman’s
        Luck</h2><p>Once per turn, when you roll for damage with a ranged weapon, you can flip one
        of the damage dice over and use the number on the bottom. You can’t use this ability on d4s.
        Note that for a balanced die, the top and bottom numbers add up to one more than the die’s
        largest number.</span></p><h2>Run and Gun</h2><p class="p3"><em>Prerequisite: Proficiency
        with simple blasters</em></span></p><p>On any turn in which you use your action to Dash, you
        can make a ranged weapon attack as a bonus action.</span></p><h2>Spray and Pray</h2><p
        class="p3"><em>Prerequisite: Proficiency with martial firearms</em></span></p><p>When it
        comes to bullets, quantity often beats quality. By holding down the trigger and firing
        nonstop, you gain the following benefits: </span></p><ul><li><p class="p4">As an action,
        while wielding a weapon that has the Automatic property, you can target a 10-foot cube area
        with a hail of bullets. Each creature in the area must succeed on a Dexterity saving throw
        (DC equals 8 + your proficiency bonus + your Dexterity modifier) or take the weapon’s normal
        damage. This action expends ten pieces of ammunition.</span></p></li><li><p class="p4">You
        can use your Strength modifier instead of your Dexterity modifier when making attack rolls
        with a weapon that has the Mounted property.</span></p></li></ul>
