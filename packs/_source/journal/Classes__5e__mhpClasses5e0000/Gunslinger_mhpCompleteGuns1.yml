  - sort: 400000
    name: Firearms
    type: text
    _id: mhpFirearms00000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>A gunslinger’s implements come in a myriad of forms that have morphed and evolved
        throughout history. This chapter contains rules for firearms and their
        use.</span></p><h2><span class="s2">Firearms</span></h2><p>Black powder represents a
        paradigm shift in the art of warfare, fueling everything from powerful siege weapons to
        concealable, handheld guns. In many campaign settings, firearms supplant the traditional
        scheme of weapons, forcing arrows, swords, and battleaxes into obsolescence. They might even
        be commonplace, a staple tool for hunting and defense.</span></p><p>Futuristic firearms,
        powered by arcane energy or extremely advanced science, are called blasters, and fire a
        pulse of energy or condensed plasma instead of conventional projectiles. While blasters are
        commonplace in many science-fiction settings, they might only make an appearance in other
        settings only as wild, steampunk-esque experiments, or in the remnants of a derelict,
        advanced civilization.</span></p><p>Firearms follow slightly different rules to conventional
        ranged weapons, and also generally use two or more damage dice. Blasters used in futuristic
        settings are considered firearms and use these rules as well.</span></p><h3>Firearm Damage
        Rolls</span></h3><p>Unlike other weapons, you don’t add your ability modifier to the damage
        roll of a firearm unless otherwise stated.</span></p><h3>Two-Weapon Fighting with
        Firearms</span></h3><p>When you engage in two-weapon fighting with two light firearms, you
        subtract 2 from the damage roll of the bonus attack, to a minimum of 1
        damage.</span></p><h3>Firearm Ammunition</span></h3><p>All firearms require special
        ammunition. Most firearms use bullets, but some require even more specialized projectiles.
        The ammunition of a firearm is destroyed upon use.</span></p><p></p><table><tbody><tr><td
        colspan="3"><h4>Firearm
        Ammunition</h4></td></tr><tr><td><p><strong>Ammunition</strong></p></td><td><p><strong>Cost</strong></p></td><td><p><strong>Weight</strong></p></td></tr><tr><td><p>Blunderbuss
        shot (10)</p></td><td><p>1 gp</p></td><td><p>2 lb.</p></td></tr><tr><td><p>Bullets
        (10)</p></td><td><p>2 gp</p></td><td><p>2 lb.</p></td></tr><tr><td><p>Dragon
        Bullet</p></td><td><p>1 gp</p></td><td><p>—</p></td></tr><tr><td><p>Grenade</p></td><td><p>5
        gp</p></td><td><p>3 lb.</p></td></tr><tr><td><p>Harpoon</p></td><td><p>5 gp</p></td><td><p>4
        lb.</p></td></tr><tr><td><p>Musket balls (10)</p></td><td><p>1 gp</p></td><td><p>2
        lb.</p></td></tr><tr><td><p>Rocket</p></td><td><p>20 gp</p></td><td><p>6
        lb.</p></td></tr><tr><td><p>Shell (10)</p></td><td><p>5 gp</p></td><td><p>2
        lb.</p></td></tr></tbody></table><p></p><h3>Firearm Proficiencies</span></h3><p
        class="p2">Characters in most campaign worlds won’t have proficiency with firearms, but in
        settings with widespread firearms, characters gain the proficiencies listed on the Firearm
        Proficiencies table.</span></p><p></p><table><tbody><tr><td colspan="2"><h4>Firearm
        Proficiencies</h4></td></tr><tr><td><p><strong>Class</strong></p></td><td><p><strong>Proficiencies</strong></p></td></tr><tr><td
        colspan="2"><p><em>Core Classes</em></p></td></tr><tr><td><p>Barbarian</p></td><td><p>Simple
        firearms, martial firearms</p></td></tr><tr><td><p>Bard</p></td><td><p>Simple firearms,
        martial firearms that don’t have the Explosive, Heat, Heavy, or Overheat
        properties</p></td></tr><tr><td><p>Cleric</p></td><td><p>Simple
        firearms</p></td></tr><tr><td><p>Druid</p></td><td><p>Simple firearms that don’t have the
        Two-Handed or Scatter properties</p></td></tr><tr><td><p>Fighter</p></td><td><p>Simple
        firearms, martial firearms</p></td></tr><tr><td><p>Monk</p></td><td><p>Simple
        firearms</p></td></tr><tr><td><p>Paladin</p></td><td><p>Simple firearms, martial
        firearms</p></td></tr><tr><td><p>Ranger</p></td><td><p>Simple firearms, martial
        firearms</p></td></tr><tr><td><p>Rogue</p></td><td><p>Simple firearms, martial firearms that
        don’t have the Explosive, Heat, Heavy, or Overheat
        properties</p></td></tr><tr><td><p>Sorcerer</p></td><td><p>Simple firearms that don’t have
        the Two-Handed or Scatter properties</p></td></tr><tr><td><p>Warlock</p></td><td><p>Simple
        firearms</p></td></tr><tr><td><p>Wizard</p></td><td><p>Simple firearms that don’t have the
        Two-Handed or Scatter properties</p></td></tr><tr><td colspan="2"><p><em>Mage Hand Press
        Classes</em></p></td></tr><tr><td><p>Alchemist</p></td><td><p>Simple
        firearms</p></td></tr><tr><td><p>Binder</p></td><td><p>Simple
        firearms</p></td></tr><tr><td><p>Captain</p></td><td><p>Simple firearms, martial
        firearms</p></td></tr><tr><td><p>Channeler</p></td><td><p>Simple firearms, martial
        firearms</p></td></tr><tr><td><p>Craftsman</p></td><td><p>Simple firearms, martial firearms,
        exotic firearms</p></td></tr><tr><td><p>Gunslinger</p></td><td><p>Simple firearms, martial
        firearms</p></td></tr><tr><td><p>Investigator</p></td><td><p>Simple firearms, martial
