        Accelerator}</p></td><td><p>800 gp</p></td><td><p>2d8 varies</p></td><td><p>12
        lb.</p></td><td><p>Automatic, ammunition (range 100/400), heavy, special,
        two-handed</span></p></td></tr></tbody></table><p></p><h2>Weapon Properties</h2><p>Many
        weapons have special properties related to their use, as shown in the weapons
        tables.</span></p><p><span class="s2"><em><strong>Ammunition.</strong></em></span> You can
        use a weapon that has the Ammunition property to make a ranged attack only if you have
        ammunition to fire from the weapon. Each time you attack with the weapon, you expend one
        piece of ammunition. The ammunition of a firearm is destroyed upon use. Drawing the
        ammunition from a quiver, case, or other container is part of the attack (you need a free
        hand to load a one-handed weapon). At the end of the battle, you can recover half your
        expended ammunition by taking a minute to search the battlefield.</span></p><p>If you use a
        weapon that has the Ammunition property to make a melee attack, you treat the weapon as an
        improvised weapon. A sling must be loaded to deal any damage when used in this
        way.</span></p><p><span class="s2"><em><strong>Automatic.</strong></em></span> When you make
        an attack with this weapon on your turn, you can choose to make two attacks instead. These
        attacks are always made with disadvantage, regardless of circumstance. These attacks use
        twice the normal amount of ammunition.</span></p><p><span
        class="s2"><em><strong>Blaster.</strong></em></span> A weapon with the Blaster property is a
        ranged weapon that requires no ammunition. Blasters are considered firearms for the purpose
        of class features and abilities. Like firearms, you don’t add your ability score modifier to
        blasters’ damage rolls.</span></p><p><span
        class="s2"><em><strong>Concealable.</strong></em></span> While stowed, you have advantage on
        Dexterity (Stealth) checks made to conceal this weapon.</span></p><p><span
        class="s2"><em><strong>Dry.</strong></em></span> If this weapon is ever submerged in water
        or doused with a significant quantity of water, it jams. A jammed firearm can’t be used to
        make an attack until a creature uses its action to clear the weapon
        malfunction.</span></p><p><span class="s2"><em><strong>Explosive.</strong></em></span> When
        this weapon’s projectile hits a target, it explodes in a 15-foot diameter sphere. The
        projectile can target an unoccupied space within its range. Each creature other than the
        target within the blast radius (for a Medium or smaller target, each creature within 5 feet
        of it) must make a DC 14 Dexterity saving throw, taking half the damage rolled on a failed
        save or no damage on a successful one.</span></p><p><span
        class="s2"><em><strong>Foregrip.</strong></em></span> This weapon can be used with one or
        two hands. If used in two hands, its normal range increases by 50 feet and its long range
        increases by 200 feet.</span></p><p><span class="s2"><em><strong>Heat.</strong></em></span>
        This weapon gains a heat point whenever an attack is made with it, and loses one heat point
        whenever you begin your turn. If the weapon gains 3 heat points, it overheats and loses all
        heat points. An overheated weapon can’t be used to make an attack again until the end of
        your next turn.</span></p><p><span class="s2"><em><strong>Heavy.</strong></em></span> Small
        creatures have disadvantage on attack rolls with heavy weapons. A heavy weapon’s size and
        bulk make it too large for a Small creature to use effectively.</span></p><p><span
        class="s2"><em><strong>Light.</strong></em></span> A light weapon is small and easy to
        handle, making it ideal for use when fighting with two weapons.</span></p><p><span
        class="s2"><em><strong>Loading.</strong></em></span> Because of the time required to load
        this weapon, you can fire only one piece of ammunition from it when you use an action, bonus
        action, or reaction to fire it, regardless of the number of attacks you can normally
        make.</span></p><p><span class="s2"><em><strong>Misfire.</strong></em></span> When you roll
        a 1 on the d20 for an attack roll with this weapon, it jams. A jammed weapon can’t be used
        to make an attack until a creature uses its action to clear the weapon
        malfunction.</span></p><p><span class="s2"><em><strong>Mounted.</strong></em></span> This
        weapon is normally used while attached to a tripod, vehicle, or other bracing mount. You can
        mount or unmount this weapon as an action. While it is mounted, it can’t be moved. It can
        only be used to make an attack while unmounted if held by a Medium or larger creature with a
        Strength score of at least 15.</span></p><p><span
        class="s2"><em><strong>Nonlethal.</strong></em></span> When you reduce a creature to 0 hit
        points using this weapon, you can choose to knock the creature out, rendering it
        unconscious, rather than deal a killing blow.</span></p><p><span
        class="s2"><em><strong>Overheat.</strong></em></span> Once you make an attack with this
        weapon, it can’t be used again to make an attack until the end of your next
        turn.</span></p><p><span class="s2"><em><strong>Reload.</strong></em></span> This weapon can
        be used to make a number of attacks before it must be reloaded. If you are proficient with
        the weapon, reloading it takes a bonus action; otherwise, reloading it takes an action. Some
        weapons require an action or longer to reload, even if you have proficiency, which is
        specified in the Reload property. If reloading a weapon requires longer than one action, the
        weapon can’t be used to make attacks until reloading is finished.</span></p><p><span
        class="s2"><em><strong>Scatter.</strong></em></span> If you make an attack against a target
        that is within half this weapon’s normal range, you deal the damage value listed in
        parentheses instead of the weapon’s normal damage dice.</span></p><p><span
        class="s2"><em><strong>Sighted.</strong></em></span> This weapon has disadvantage on attack
        rolls made against targets within 20 feet.</span></p><p><span
        class="s2"><em><strong>Special.</strong></em></span> A weapon with the special property has
        unusual rules governing its use, explained in the weapon’s description (see “Special
        Weapons”).</span></p><p><em><strong>Twinshot.</strong></em></span><span class="s2"> Once on
        each of your turns when you make an attack with this weapon, you can make another attack
        with it against a different creature that is within 5 feet of the original target and within
        range of the weapon.</span></p><p><em><strong>Two-Handed.</strong></em></span><span
        class="s2"> This weapon requires two hands when you attack with it.</span></p><h2>Special
        Weapons</h2><p><span class="s2">Weapons with special properties are described
        here.</span></p><p><em><strong>Avia-Ra Sunstaff.</strong></em></span><span class="s2"> This
        weapon can also be used as a
        quarterstaff.</span></p><p><em><strong>Bomb.</strong></em></span><span class="s2"> When a
        bomb hits a target, it explodes in a 5-foot radius and is destroyed. The bomb can be thrown
        at an unoccupied space within its range. Each creature other than the target within the
        blast radius must succeed on a DC 11 Dexterity saving throw, taking half the damage rolled
        on a failed save or no damage on a successful one.</span></p><p><span
        class="s2">Additionally, as a bonus action, you can empty some of the bomb’s explosive
        material to permanently remove the blast radius from this bomb, dealing damage only to the
        bomb’s target.</span></p><p><em><strong>Diode Beam.</strong></em></span><span class="s2"> As
        an action, this weapon can be fired continuously in a beam, affecting a 120-foot long,
        5-foot wide line in a direction you choose. When a creature enters the area for the first
        time on a turn or starts its turn there, it must make a DC 14 Dexterity saving throw or take
        4d6 radiant damage.</span></p><p><span class="s2">At the beginning of each of your
        subsequent turns, roll a d20. On a 5 or lower, the weapon overheats and can’t be fired until
        the end of your next turn. If you roll higher than 5, you can use your action to continue
        firing the beam and can change the direction the line faces from
        you.</span></p><p><em><strong>Fusion Emitter.</strong></em></span><span class="s2"> When
        this weapon hits a target, each creature within 5 feet of the target is pushed 5 feet away
        from it.</span></p><p><em><strong>Light Cannon.</strong></em></span><span class="s2"> This
        weapon deals double damage to objects and structures.</span></p><p><em><strong>Linear
        Accelerator.</strong></em></span><span class="s2"> This weapon uses any item of 10 pounds of
        less that can fit within a 1-foot cube as ammunition. Its damage type is bludgeoning,
        piercing, or slashing damage, as appropriate to the ammunition
        used.</span></p><p><em><strong>Psionic Helm.</strong></em></span><span class="s2"> You can
        use your choice of Intelligence, Wisdom, or Charisma, instead of Dexterity, for this
        weapon’s attack rolls.</span></p><p><em><strong>Rocket Launcher.</strong></em></span><span
        class="s2"> This weapon deals double damage to objects and
        structures.</span></p><p><em><strong>Singularity Emitter.</strong></em></span><span
        class="s2"> When this weapon hits a target, each creature within 10 feet of the target is
        pulled up to 5 feet toward it.</span></p><p><em><strong>Volcanic.</strong></em></span><span
        class="s2"> Whenever you make an attack with this weapon, it spews flames in a 15-foot
        radius cone. Each creature within that area must make a DC 14 Dexterity saving throw or take
        2d6 fire damage.</span></p>
