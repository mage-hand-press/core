  - sort: 300000
    name: Encryptogram
    type: text
    _id: mhpEncryptogram0
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Your knowledge of ciphers has improved your magically clandestine communications. When
        you cast the
        <em>@UUID[Compendium.mage-hand-press-complete-warmage.spells24.Item.mhpCryptogram000]{Cryptogram}</em>
        cantrip, its limit is 20 characters, instead of 8, and you can choose to magically encrypt
        the message such that only the specified recipient can read it.</p>
    video:
      controls: true
      volume: 0.5
