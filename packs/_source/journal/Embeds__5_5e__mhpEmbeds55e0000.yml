      content: >-
        <p>When you take the Attack action, you can replace one of your attacks with an explosion
        from this weapon’s projectile. This explosion is a 5-foot-radius Sphere centered on a point
        you choose within the weapon’s normal range. Each creature within the Sphere makes a
        Dexterity saving throw (DC 8 plus your Strength or Dexterity modifier and your Proficiency
        Bonus). On a failed save, a creature takes the weapon’s damage, but don’t add your ability
        modifier to that damage unless that modifier is negative. On a successful save, a creature
        takes half as much damage. You can create an explosion only once per turn.</p>
