        against you, you take a Reaction to cast <em>Vicious Mockery</em> targeting the attacker. If
        the creature fails its saving throw, the attacker has Disadvantage on the triggering attack
        roll, instead of its next attack roll, potentially causing the attack to miss.</p><p>Once
        you cast this cantrip as a Reaction, you can’t do so again until you finish a Short or Long
