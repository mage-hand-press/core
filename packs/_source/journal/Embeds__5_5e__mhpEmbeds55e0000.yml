  - sort: 200000
    name: Blinding Light
    type: text
    _id: mhpBlindingLight
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>When you cast the <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplLight00000]{Light}</em>
        cantrip on an object you are holding, you can direct a flare at a creature you can see
        within 10 feet of yourself, which must make a Constitution saving throw against your spell
        save DC. On a failed save, the target has the &amp;Reference[Blinded] condition until the
        start of your next turn. A creature that fails its save against this effect is immune to it
        for 1 minute, after which it can be affected again.</p>
