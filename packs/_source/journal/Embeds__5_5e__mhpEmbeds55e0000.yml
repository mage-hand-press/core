  - sort: 800000
    name: Minor Shadow Illusion
    type: text
    _id: mhpMinorShadowIl
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>When you create the image of an object in an unoccupied space using the
        <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplMinorIllus]{Minor Illusion}</em> cantrip, you
        can fill it with fibers of shadowstuff, causing it to become partially real. No matter what
        form the semi-real object takes, it still must be no larger than a 5-foot Cube. It has AC 10
        and 5 Hit Points, and it weighs 5 pounds. You can only have one semi-real illusion at a
        time. While this semi-real object exists, the cantrip requires Concentration.</p><p>The
        illusion can’t replicate a creature, but it can deal damage to a creature within its 5-foot
        Cube if the illusion is of an object that can deal damage. A creature that enters the
        illusion’s area or begins its turn there must make an Intelligence saving throw against your
        spell save DC. On a failed save, the creature takes [[/damage]]{1d6} damage of a type
        appropriate to the illusion. This damage can’t trigger Warmage Edge or any Warmage tricks.
        This damage increases by 1d6 when you reach Warmage level 5 (2d6), 11 (3d6), and 17
        (4d6).</p>
    video:
      controls: true
