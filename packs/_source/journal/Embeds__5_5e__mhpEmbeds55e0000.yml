  - sort: 1000000
    name: Rapid Fortification
    type: text
    _id: mhpRapidFortific
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You can cast the <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplMending000]{Mending}</em>
        cantrip as an action or a Bonus Action. If you cast it as an action, you can use one of the
        following effects.</p><p><strong>Repair.</strong> You can restore a single nonmagical
        object, such as a door, Cart, or window, to pristine condition if at least half of its parts
        are present. This object can be no larger than 10 cubic feet, or 1 cubic foot if it is
        exceptionally complex (such as a clock).</p><p><strong>Fortify.</strong> You can build
        simple fortifications, such as sealing a door shut, adding wooden planks to a window, or
        building a short stone wall (no larger than 10 cubic feet). You must have the materials
        present to use this ability.</p>
