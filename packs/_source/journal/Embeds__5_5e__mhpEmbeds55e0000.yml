  - sort: 600000
    name: Magic Moment
    type: text
    _id: mhpMagicMoment00
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>When you cast
        <em>@UUID[Compendium.mage-hand-press-complete-warmage.spells24.Item.mhpMomenttoThink]{Moment
        to Think}</em>, you can choose to also stop time for a creature you can see within 30 feet
        of you. The creature can take one of the actions permitted by the spell during your turn,
        and you can interact with one another while time is stopped. During this time you can take
        the Influence action, exchange items, swap locations with a willing creature within 5 feet
        of you, take the Help action for tasks while time is stopped, attempt to stabilize an
        Unconscious creature that has 0 Hit Points, or have a short conversation without
        eavesdropping or interruption.</p>
    video:
      controls: true
      volume: 0.5
