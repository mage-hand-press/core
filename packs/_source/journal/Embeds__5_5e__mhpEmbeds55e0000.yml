  - sort: 500000
    name: Infinite Variation
    type: text
    _id: mhpInfiniteVaria
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You have become exceptionally skilled at using the
        <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplPrestidigi]{Prestidigitation}</em> cantrip to
        mimic other spells. When you cast <em>Prestidigitation</em>, you can attempt to emulate the
        effects of another cantrip that doesn’t deal damage, even one that is not on the Warmage
        spell list. To do so, you must succeed on a [[/check]] check, otherwise the spell fails.
        Intelligence is your spellcasting ability for a cantrip cast using this trick, and it counts
        as a Warmage cantrip for you.</p>
