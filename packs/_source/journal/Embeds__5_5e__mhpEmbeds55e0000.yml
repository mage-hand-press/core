  - sort: 500000
    name: Mage Hand Knack
    type: text
    _id: mhpMageHandKnack
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Your skill with the <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplMageHand00]{Mage
        Hand}</em> cantrip allows you to use it as an extension of yourself. You can cast the spell
        as a Bonus Action instead of an action. You can also control the hand as a Bonus Action on
        each of your turns, and can use one of the following abilities when you control the
        hand.</p><p><strong>Press.</strong> The hand pushes against a Large or smaller creature
        within 5 feet of it until the start of your next turn. Choose a direction away from that
        creature. Every foot of movement in that direction while the hand is pressing against it
        costs the creature 1 extra foot of movement.</p><p><strong>Punch.</strong> The hand strikes
        one creature or object within 5 feet of it. Make a melee spell attack for the hand. On a
        hit, the target takes [[/damage]] damage.</p><p><strong>Seize.</strong> The hand attempts to
        grapple a Small or smaller creature within 5 feet of it. The target must succeed on a
        [[/save]] saving throw against your spell save DC (it chooses which), or it has the Grappled
        condition. The escape DC equals your spell save DC. The hand continues grappling the target
        until the spell ends or you take a Bonus Action to control the hand.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    category: mhpWarmage000000
    ownership:
      default: -1
    flags: {}
