  - sort: 350000
    name: Field Medic
    type: text
    _id: mhpFieldMedic000
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You learn the <em>@UUID[Compendium.dnd5e.spells24.Item.phbsplSparetheDy]{Spare the
        Dying}</em> cantrip. You can cast this cantrip as a Bonus Action. Additionally, when you
        cast it on a creature that has 0 Hit Points, the target regains 1 Hit Point and gains
        Temporary Hit Points equal to your Warmage level, which last for 1 minute.</p><p>Once a
        creature regains Hit Points from this trick, it can’t do so again until it finishes a Long
        Rest.</p>
