      content: >-
        <ul><li><p>As a bonus action, you can call your signature focus to your hand, as long as you
        are on the same plane of existence as it.</p></li><li><p>You can add your Intelligence
        modifier, instead of your Strength or Dexterity modifier, to attack and damage rolls using
        your signature focus.</p></li><li><p>Your signature focus gains a number of charges equal to
        your Intelligence modifier (a minimum of 1). When you deal damage to a creature with it or a
        cantrip cast through it, you can expend 1 charge to deal an extra 1d8 force damage to that
