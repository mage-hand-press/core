  - sort: 200000
    name: Tricks with Enchantments
    type: text
    _id: mhpTrickswithEnc
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <section class="fvtt advice"><figure class="icon"><img
        src="icons/magic/symbols/question-stone-yellow.webp" class="round"></figure><article><h3
        data-no-toc>Tricks with Enchantments</h3><p>Warmage tricks that modify existing spells
        contain an Enchant activity that can be used to apply an Enchantment to the modified spell.
        When gaining this trick, use its Enchant activity and then drag the appropriate spell from
        the <strong>Spells</strong> tab on your character sheet onto the chat card created.</p><p>To
        remove the modification simply open the enchanted spell, change to the
        <strong>Effects</strong> tab and right click on the enchantment where you can disable or
        delete it.</p></article></section>
    video:
      controls: true
      volume: 0.5
    src: null
