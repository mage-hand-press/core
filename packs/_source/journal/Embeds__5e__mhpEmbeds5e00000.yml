  - sort: 600000
    name: Infinite Variation
    type: text
    _id: mhpInfiniteVaria
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You have become exceptionally skilled at using the
        <em>@UUID[Compendium.dnd5e.spells.Item.udsLtG0BugXHR2JQ]{prestidigitation}</em> cantrip to
        mimic other spells. When you cast <em>prestidigitation</em>, you can use it to emulate the
        effects of any other cantrip that doesn’t deal damage, even one that is not on the warmage
        spell list. To do so, you must succeed on a [[/check]] check, otherwise the spell fails.
        Intelligence is your spellcasting ability for a cantrip cast using this trick, and it counts
        as a warmage cantrip for you.</p>
