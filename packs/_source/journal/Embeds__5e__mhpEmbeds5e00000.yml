  - sort: 800000
    name: Mage Hand Knack
    type: text
    _id: mhpMageHandKnack
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Your skill with the <em>@UUID[Compendium.dnd5e.monsters.Actor.zwT2WjWo7cTm2631]{mage
        hand}</em> cantrip allows you to use it as an extension of yourself. When you cast the spell
        and as a bonus action on your subsequent turns, you can use one of the following effects
        with the hand:</p><p><strong>Press.</strong> The hand pushes against a Large or smaller
        creature within 5 feet of it. Choose a direction away from that creature. Every foot of
        movement in that direction while the hand is pressing against it costs the creature 1 extra
        foot of movement. The hand continues to push against the target until the spell ends or you
        use your bonus action to use a different effect with the hand.</p><p><strong>Punch.</strong>
        The hand strikes one creature or object within 5 feet of it. Make a melee spell attack for
        the hand. On a hit, the target takes [[/damage]] damage.</p><p><strong>Seize.</strong> The
        hand grabs a Small or smaller creature and attempts to grapple it. The creature must succeed
        on a [[/check]] check (its choice) against your spell save DC or be &amp;Reference[grappled
        apply=false]{grappled} by the hand. The hand continues to grapple the target until the
        target uses an action to break the grapple on its turn, the spell ends, or you use your
        bonus action to use a different effect with the hand.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    category: mhpWarmage000000
    ownership:
      default: -1
    flags: {}
