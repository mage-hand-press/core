  - sort: 900000
    name: Minor Shadow Illusion
    type: text
    _id: mhpMinorShadowIl
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>When you create the image of an object in an unoccupied space using the
        <em>@UUID[Compendium.dnd5e.spells.Item.oIzA2MEHwxhtQneU]{minor illusion}</em> cantrip, you
        can fill it with fibers of shadowstuff, causing it to become partially real. No matter what
        form the semi-real object takes, it still must be no larger than a 5-foot cube. It has AC 10
        and 5 hit points, and it weighs 5 pounds. You can only have one semi-real illusion at a
        time. While this semi-real object exists, the cantrip requires your concentration.</p><p>The
        illusion can’t replicate a creature, but it can deal damage to a creature within its 5-foot
        cube. If the illusion is of an object that can deal damage, a creature that enters the
        object’s 5-foot cube or begins its turn there must make an Intelligence saving throw against
        your spell save DC. On a failed save, the creature takes [[/damage]]{1d6} damage of a type
        appropriate to the illusion. This damage increases by 1d6 when you reach 5th level (2d6),
        11th level (3d6), and 17th level (4d6). This damage can’t trigger Warmage Edge or any
        warmage tricks.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    category: mhpWarmage000000
    ownership:
      default: -1
    flags: {}
