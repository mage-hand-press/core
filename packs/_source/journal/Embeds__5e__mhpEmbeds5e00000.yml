  - sort: 500000
    name: Field Medic
    type: text
    _id: mhpFieldMedic000
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>You learn the <em>@UUID[Compendium.dnd5e.spells.Item.8zT7njvqbpXs4Cel]{spare the
        dying}</em> cantrip, which doesn’t count against your number of cantrips known.
        Additionally, when you cast <em>spare the dying</em> on a creature that has 0 hit points,
        the target regains 1 hit point and gains temporary hit points equal to your warmage level,
        which last for 1 minute. Once a creature regains hit points from this trick, it can’t do so
        again until it finishes a long rest.</p>
