  - sort: 100000
    name: Blade Cantrips and Warmages
    type: text
    _id: mhpBladeCantrips
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <section class="fvtt advice"><figure class="icon"><img class="round"
        src="icons/magic/symbols/question-stone-yellow.webp" /></figure><article><h3
        data-no-toc>Blade Cantrips and Warmages</h3><p>The weapon damage dealt by <em>Arc
        Blade</em>, <em>Burning Blade</em>, <em>Frigid Blade</em>, and <em>True Strike</em> count as
        cantrip damage for the purposes of your Warmage features.</p></article></section>
    video:
      controls: true
