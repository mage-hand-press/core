  - sort: 300000
    name: Blinding Light
    type: text
    _id: mhpBlindingLight
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>When you use the <em>@UUID[Compendium.dnd5e.spells.Item.Bnn9Nzajixvow9xi]{light}</em>
        cantrip to target an object you are holding, you can direct a flare at a creature you can
        see within 10 feet of you, which must make a Constitution saving throw against your spell
        save DC. On a failed save, the target is &amp;Reference[blinded]{blinded} until the start of
        your next turn. After a creature has failed a saving throw against this trick, it has
        advantage on all saving throws against it for the next 24 hours.</p>
