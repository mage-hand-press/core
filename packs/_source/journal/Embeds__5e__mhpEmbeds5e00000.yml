  - sort: 400000
    name: Encryptogram
    type: text
    _id: mhpEncryptogram0
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Your knowledge of ciphers has improved your magically clandestine communications. When
        you cast the
        <em>@UUID[Compendium.mage-hand-press-complete-warmage.spells14.Item.mhpCryptogram000]{cryptogram}</em>
        cantrip, its limit is 20 characters, instead of 8, and only the specified recipient can read
        the message.</p>
