  description:
    value: >-
      <p>Beginning at 2nd level, you learn to use Warmage Tricks, special techniques that alter the
      way you fight, move, and cast your spells. You learn two tricks of your choice for which you
      meet the prerequisites. At higher levels, you learn additional tricks as shown in the Tricks
      Known column of the Warmage table.</p><p>Additionally, when you gain a level in this class,
      you can choose one of the tricks you know and replace it with another trick for which you meet
      the prerequisites.</p>
