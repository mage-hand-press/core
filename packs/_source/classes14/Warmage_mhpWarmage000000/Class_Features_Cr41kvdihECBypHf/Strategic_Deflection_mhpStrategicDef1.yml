folder: Cr41kvdihECBypHf
name: Strategic Deflection
type: feat
img: icons/magic/defensive/shield-barrier-deflect-gold.webp
system:
  description:
    value: >-
      <p>When a creature casts a spell that forces you to make a saving throw to avoid damage, you
      can take a Reaction to attempt to redirect some of the spell’s energy to a new target. If you
      succeed on your saving throw against the spell, choose another creature you can see within the
      spell’s range or up to 30 feet away from you, whichever is closer, to make a saving throw
      against the spell, using your spell save DC. The chosen creature can be the original
      spellcaster. On a failed save, the creature suffers the effects of the spell as if you had
      cast the spell and it had been the original target or been within the area of the
      spell.</p><p>Once you use this feature, you can’t use it again until you finish a Short or
      Long Rest.</p>
