system:
  description:
    value: >-
      <p>You have learned the simple, yet potent brand of spellcasting for which Warmages are
      known.</p><p><strong>Cantrips.</strong> You know four Warmage cantrips of your choice.
      @UUID[Compendium.mage-hand-press-complete-warmage.spells14.Item.mhpForceDart0000]{Force Dart},
      @UUID[Compendium.dnd5e.spells24.Item.phbsplPrestidigi]{Prestidigitation},
      @UUID[Compendium.mage-hand-press-complete-warmage.spells14.Item.mhpQuickstep0000]{Quickstep},
      and @UUID[Compendium.dnd5e.spells24.Item.phbsplShockingGr]{Shocking Grasp} are recommended.
      Whenever you gain a Warmage level, you can replace one of your cantrips from this feature with
      another Warmage cantrip of your choice. You can’t replace a cantrip that is a prerequisite for
      a Warmage trick, unless you replace the trick at the same time.</p><p>You learn additional
      Warmage cantrips of your choice at higher levels, as shown in the Cantrips column of the
      Warmage Features table.</p><p>If another Warmage feature gives you cantrips, those cantrips
      don’t count against your number of cantrips known, but otherwise count as Warmage cantrips for
      you.</p><p><strong>Spellcasting Ability.</strong> Intelligence is your spellcasting ability
      for your Warmage spells.</p><p><strong>Spellcasting Focus.</strong> You can use an Arcane
      Focus as a Spellcasting Focus for your Warmage spells.</p>
