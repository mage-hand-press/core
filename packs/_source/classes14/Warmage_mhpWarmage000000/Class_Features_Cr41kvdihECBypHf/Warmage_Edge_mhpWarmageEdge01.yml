name: Warmage Edge
type: feat
img: icons/magic/fire/orbs-silhouette-sun.webp
system:
  description:
    value: >-
      <p>Starting at 2nd level, once on each of your turns when you deal damage with a warmage
      cantrip, you can improve one damage roll of the spell, adding your Intelligence modifier to
      the roll if you don’t already add it. Starting at 5th level, and as you gain levels in this
      class, you also add extra dice to the damage roll of your warmage cantrips, as shown in the
      Cantrip Bonus Dice column of the Warmage table. For example, when you are at 5th level, you
      can improve the damage of the <em>@UUID[Compendium.dnd5e.spells.Item.EOmsUcFQJTfG2oio]{fire
      bolt}</em> cantrip to deal fire damage equal to 3d10 + your Intelligence modifier on a
      hit.</p>
