  description:
    value: >-
      <p><em>Prerequisite: 5th level</em></p><p>When you finish a long rest, you can place a unique
      sigil on a simple or martial weapon, which becomes your signature focus until you use this
      ability again. This weapon becomes magical, and you can use it as a spellcasting focus for
      your warmage spells. Your signature focus is bonded to you, and gains a number of special
