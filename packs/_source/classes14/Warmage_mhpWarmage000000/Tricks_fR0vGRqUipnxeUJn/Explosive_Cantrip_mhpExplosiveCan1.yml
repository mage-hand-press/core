name: Explosive Cantrip
type: feat
img: icons/magic/fire/beam-jet-stream-yellow.webp
system:
  description:
    value: >-
      <p>Once on each of your turns, when you deal Fire damage to a creature with a Warmage cantrip,
      you can create an explosion in a 5-foot Emanation originating from the target. Each creature
      other than the target and yourself within the Emanation makes a Dexterity saving throw against
      your spell save DC, taking half the Fire damage rolled on a failed save, or no damage on a
      successful one.</p>
