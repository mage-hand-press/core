system:
  description:
    value: >-
      <p><em>Prerequisite: 10th level, House of Lancers</em></p><p>Once on each of your turns, when
      you score a critical hit with a melee attack or reduce a creature to 0 hit points with one,
      you can make an unarmed strike against a second target. If the target is within range of your
      Shock Trooper feature, you can lunge toward it. On a hit, the target takes an extra 1d8 force
      damage.</p>
