system:
  description:
    value: >-
      <p><span class="s1">As a gunslinger, you gain the following class
      features.</span></p><h3><span class="s1">Hit Points</span></h3><p class="p3"><strong>Hit
      Dice:</strong><span class="s1"> 1d8 per gunslinger level<br /></span><strong>Hit Points at 1st
      Level:</strong><span class="s1"> 8 + your Constitution modifier<br /></span><strong>Hit Points
      at Higher Levels:</strong><span class="s1"> 1d8 (or 5) + your Constitution modifier per
      gunslinger level after 1st</span></p><h3><span class="s1">Proficiencies</span></h3><p
      class="p3"><strong>Armor:</strong><span class="s1"> Light armor<br
      /></span><strong>Weapons:</strong><span class="s1"> Simple weapons, simple firearms, martial
      firearms<br /></span><strong>Tools:</strong><span class="s1"> One type of gaming set<br
      /></span><strong>Saving Throws:</strong><span class="s1"> Dexterity, Charisma<br
      /></span><strong>Skills:</strong><span class="s1"> Choose two from: Acrobatics, Animal
      Handling, Athletics, Deception, Insight, Intimidation, Perception, Persuasion, Sleight of
      Hand, and Stealth</span></p>
