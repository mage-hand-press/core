  description:
    value: >-
      <p>Once per turn when you make a ranged weapon attack, you can spend a risk die to hide the
      source of the attack. Though this does not silence the attack, it does obscure other markers
      of the attack, such as muzzle flare, which might implicate you as the attacker. Make a
      Charisma (Deception) check and add the risk die to the roll, opposed by the highest passive
      Perception score of the spectators. On a success, no spectator to the attack can identify its
      source.</p>
