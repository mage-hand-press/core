  description:
    value: >-
      <p><span class="s1">You adopt a particular style of gunfighting as your specialty. Choose one
      of the following options. You can’t take a Fighting Style option more than once, even if you
      later get to choose again.</span></p><h3><span class="s1">Akimbo</span></h3><p
      class="p1"><span class="s1">When you engage in two-weapon fighting with firearms, you don’t
      take a penalty to the damage of the second attack.</span></p><h3><span
      class="s1">Bullseye</span></h3><p class="p1"><span class="s1">You gain a +2 bonus to ranged
      attack rolls you make with firearms. The weapon must have the Sighted property or have a
      normal range of 80 feet or longer to gain this benefit. This benefit doesn’t stack with the
      Archery fighting style.</span></p><h3><span class="s1">Duelist</span></h3><p class="p1"><span
      class="s1">While you are wielding a firearm in one hand and nothing in the other, if you make
      a ranged weapon attack and exceed the target’s AC by 5 or more, you deal one extra die of
      weapon damage. You can only use this ability once per round.</span></p><h3><span
      class="s1">Shotgunner</span></h3><p class="p2"><span class="s1">When you hit with a ranged
      weapon attack using a firearm that has the Scatter property, you can reroll the lowest damage
      die, and you must use the new roll, even if the new roll is worse than the
      original.</span></p>
