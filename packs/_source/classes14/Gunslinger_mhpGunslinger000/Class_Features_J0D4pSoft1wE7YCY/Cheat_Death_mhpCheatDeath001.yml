  description:
    value: >-
      <p><span class="s1">By 15th level, you have a knack for evading the grave. When you drop to 0
      hit points and don’t die outright, you can use your reaction and expend one risk die to remain
      standing. You instead drop to a number of hit points equal to the number rolled on the
      die.</span></p><p class="p1"><span class="s1">Once you use this feature, you can’t use it
