  description:
    value: >-
      <p>Starting at 6th level, whenever you score a critical hit against a Large or smaller
      creature with a firearm, the bullet lodges itself in the target. Until the creature uses its
      action to dislodge the bullet, it moves at half speed and has disadvantage on attack rolls and
      ability checks. Elementals, Oozes, and Undead are immune to this effect.</p>
