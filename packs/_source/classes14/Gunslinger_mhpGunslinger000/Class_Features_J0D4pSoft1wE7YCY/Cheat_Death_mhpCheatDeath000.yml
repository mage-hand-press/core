  description:
    value: >-
      <p>By 15th level, you have a knack for evading the grave. When you drop to 0 hit points and
      don’t die outright, you can use your reaction and expend one risk die to remain standing. You
      instead drop to a number of hit points equal to the number rolled on the die.</p><p>Once you
      use this feature, you can’t use it again until you finish a short or long rest.</p>
