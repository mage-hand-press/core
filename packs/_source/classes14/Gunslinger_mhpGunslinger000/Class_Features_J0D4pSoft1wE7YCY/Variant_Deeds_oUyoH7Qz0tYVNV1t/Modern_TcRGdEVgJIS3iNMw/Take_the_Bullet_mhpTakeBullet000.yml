  description:
    value: >-
      <p>As a reaction when a creature within 15 feet of you is targeted by a ranged attack, you can
      spend a risk die to dive in the way of the bullet. You move next to the creature and become
      the target of the attack. If you are hit, you can subtract the risk die from the damage
      taken.</span></p>
