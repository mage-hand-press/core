  description:
    value: >-
      <p>By 2nd level, you can perform incredible feats of daring that are fueled by special dice
      called risk dice.</p><h5>Risk Dice</h5><p class="p1">You have four risk dice, which are d8s.
      You gain additional risk dice, and your risk dice change as you gain levels in this class, as
      shown in the Risk Dice column of the Gunslinger table. You regain all expended risk dice when
      you finish a long rest.</p><h5>Using Risk Dice</h5><p><span class="s1">Once per turn, you can
      expend a risk die to perform a deed of your choice. Your deed options are detailed at the
      @UUID[Compendium.mage-hand-press-core.journal.JournalEntry.mhpGunslinger5e0.JournalEntryPage.mhpDeeds00000000]{end
      of the class description}.</span></p><h5><span class="s1">Saving Throws</span></h5><p>Some of
      your deeds require your target to make a saving throw to resist the deed’s effects. The saving
      throw DC is calculated as follows:</p><p style="text-align:center" class="p3"><span
      class="s1"><strong>Deed save DC</strong> = 8 + your proficiency bonus + your Dexterity
      modifier</span></p>
