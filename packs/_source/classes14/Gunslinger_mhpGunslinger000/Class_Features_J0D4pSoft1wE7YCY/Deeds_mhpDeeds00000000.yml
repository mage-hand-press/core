  description:
    value: >-
      <p><span class="s1">The deeds are presented in alphabetical order.</span></p><h3><span
      class="s1">Bite the Bullet</span></h3><p class="p1"><span class="s1">As a bonus action on your
      turn, you can expend one risk die to gain temporary hit points equal the number rolled on the
      die + your Constitution modifier.</span></p><h3><span class="s1">Covering Fire</span></h3><p
      class="p1"><span class="s1">When you hit a creature with a ranged weapon attack, you can
      expend one risk die as a bonus action to cow the creature. Roll the risk die and subtract it
      from the next attack roll the creature makes before the start of your next
      turn.</span></p><h3><span class="s1">Dodge Roll</span></h3><p class="p1"><span class="s1">You
      can expend one risk die as a bonus action to move up to 15 feet and reload any firearm you are
      holding. This movement doesn’t provoke opportunity attacks, ignores &amp;Reference[difficult
      terrain], and allows you to move through a hostile creature’s space, as long as you don’t end
      your movement there.</span></p><h3><span class="s1">Limb Shot</span></h3><p class="p1"><span
      class="s1">When you hit a creature with a ranged weapon attack, you can expend one risk die as
      a bonus action and aim for one of its limbs, attempting to force it to drop one item of your
      choice that it’s holding. The target must make a [[/save con]] saving throw. On a failed save,
      it drops the object you choose. The object lands at its feet.</span></p><h3><span
      class="s1">Skin of Your Teeth</span></h3><p class="p1"><span class="s1">When an attacker you
      can see makes an attack roll against you, you can expend a risk die as a reaction to dodge out
      of harm’s way at the last second. You add the risk die to your AC against this attack,
      potentially causing it to miss.</span></p><h3><span class="s1">Steady Aim</span></h3><p
      class="p1"><span class="s1">On your turn, you can use a bonus action and expend one risk die
      to double the normal and maximum range for the next ranged weapon attack you make.</span></p>
    chat: >-
      <p><span class="s1">By 2nd level, you can perform incredible feats of daring that are fueled
      by special dice called risk dice.</span></p>
