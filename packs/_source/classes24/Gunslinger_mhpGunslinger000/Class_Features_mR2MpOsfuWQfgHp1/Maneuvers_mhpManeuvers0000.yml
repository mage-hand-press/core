  description:
    value: >-
      <p><span class="s1">The maneuvers are presented in alphabetical order.</span></p><h3><span
      class="s1">Bite the Bullet</span></h3><p class="p1"><span class="s1">As a Bonus Action, you
      can expend one Risk Die to gain Temporary Hit Points equal to the number rolled on the die
      plus your Gunslinger level.</span></p><h3><span class="s1">Blindfire</span></h3><p
      class="p2"><span class="s1">You can take a Bonus Action and expend one Risk Die to gain
      &amp;Reference[Blindsight] with a range of 30 feet until the end of the current
      turn.</span></p><h3><span class="s1">Dodge Roll</span></h3><p class="p2"><span class="s1">You
      can expend one Risk Die as a Bonus Action to move up to 15 feet and reload any Ranged weapon
      you are holding. This movement doesn’t provoke &amp;Reference[Opportunity Attacks] and is
      unaffected by &amp;Reference[Difficult Terrain].</span></p><h3><span class="s1">Grazing
      Shot</span></h3><p class="p2"><span class="s1">When you miss with a ranged attack roll using a
      weapon, you can expend one Risk Die (no action required) to deal damage to that creature equal
      to a roll of the die plus your Dexterity modifier (minimum of 1). This damage is the same type
      dealt by the weapon, and the damage can be increased only by increasing the ability modifier.
      You can only use this maneuver once per turn.</span></p><h3><span class="s1">Maverick
      Spirit</span></h3><p class="p2"><span class="s1">When you fail an Intelligence, Wisdom, or
      Charisma ability check or saving throw, you can expend one Risk Die to add it to the roll,
      potentially turning it into a success. You can only use this maneuver once per
      turn.</span></p><h3><span class="s1">Skin of Your Teeth</span></h3><p class="p2"><span
      class="s1">When a creature you can see hits you with an attack roll, you can take a Reaction
      and expend one Risk Die to dodge out of harm’s way. Roll the die and add the number rolled to
      your AC against this attack, potentially causing it to miss.</span></p><section class="secret"
