  description:
    value: "<p><span class=\"s1\">When you’re subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw and only half damage if you fail.</span></p><p class=\"p1\"><span class=\"s1\">You don’t benefit from this feature if you have the Incapacitated condition.</span></p><section class=\"secret\" id=\"secret-26D8PEweYmEJ62Lw\"><p><em><strong>*Foundry Note</strong></em></p><p>With your token selected you can either right click on the damage roll's chat card and select <span class=\"reference\"><em class=\"fas fa-user-shield\">\_</em>Apply Half Damage</span> or click the \"1/2\" button and then the <span class=\"reference\"><em class=\"fa-solid fa-reply-all\">\_</em>Apply</span> button.</p></section>"
