  description:
    value: >-
      <p>When you miss with a ranged attack roll using a weapon, you can expend one Risk Die (no
      action required) to deal damage to that creature equal to a roll of the die plus your
      Dexterity modifier (minimum of 1). This damage is the same type dealt by the weapon, and the
      damage can be increased only by increasing the ability modifier. You can only use this
      maneuver once per turn.</span></p>
