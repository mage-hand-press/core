  description:
    value: >-
      <p>You can perform incredible feats of daring fueled by special dice called Risk
      Dice.</p><p><em><strong>Risk Dice.</strong></em> You have four Risk Dice, which are d8s. A
      Risk Die is expended when you use it. You regain all expended Risk Dice when you finish a
      Short or Long Rest. Your Risk Die changes and more Risk Dice become available as shown on the
      Risk Dice column of the Gunslinger Features table.</p><p><em><strong>Maneuvers.</strong></em>
      You can expend Risk Dice to perform maneuvers. Your maneuver options are detailed
      @UUID[Compendium.mage-hand-press-core.journal.JournalEntry.mhpGunslinger55e.JournalEntryPage.mhpManeuverOptio]{later
      in the class description}.</p><p><em><strong>Saving Throws.</strong></em> If a maneuver
      requires a saving throw, the DC equals 8 plus your Dexterity modifier and Proficiency
      Bonus.</p>
