name: Two-Weapon Fighting
system:
  description:
    value: >-
      <p><em>(Prerequisite: Fighting Style Feature)</em></p><p>When you make an extra attack as a
      result of using a weapon that has the Light property, you can add your ability modifier to the
      damage of that attack if you aren't already adding it to the damage.</p><section
      class="secret" id="secret-hYptyfGCa0gLDQRT"><p><strong>Foundry Note</strong></p><p>This
      feature is not automated. You can add your modifier in the Situational Bonus field of the
      damage roll.</p></section>
