  description:
    value: "<p><span class=\"s1\">When you deal damage with a Ranged weapon that doesn’t add your ability modifier to the roll, you add your ability modifier nonetheless. If you already add your modifier to the damage roll, the target takes an extra 1d8 damage of the weapon’s type.</span><span class=\"Apple-converted-space\">\_</span></p><p class=\"p1\"><span class=\"s1\">Note that weapons that have the Firearm property don’t add your ability modifier to damage rolls.</span></p><section id=\"secret-2TDbHbYCiJSnCsi8\" class=\"secret\"><p><em><strong>*Foundry Note:</strong></em> This feature is not automated. When you gain this feature each of your firearms will need the '-@abilities.dex.mod' removed from the damage formula. Then the weapon will automatically add your ability modifier to your damage rolls. <br /><br />If you already add your ability modifier to damage rolls, you will have to add the additional 1d8 to the damage formula section of each of your Ranged weapons.</p></section>"
