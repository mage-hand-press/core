system:
  description:
    value: "<table><caption>Core Gunslinger Traits</caption><tbody><tr><th><p>Primary Ability</p></th><td><p>Dexterity</p></td></tr><tr><th><p>Hit Point Die</p></th><td><p>D8 per Gunslinger level</p></td></tr><tr><th><p>Saving Throw Proficiencies</p></th><td><p>Dexterity and Charisma</p></td></tr><tr><th><p>Skill Proficiencies</p></th><td><p><em>Choose 2:</em> Acrobatics, Animal Handling, Athletics, Deception, Insight, Intimidation, Perception, Persuasion, Sleight of Hand, and Stealth</p></td></tr><tr><th><p>Weapon Proficiencies</p></th><td><p>Simple weapons and Martial Ranged weapons</p></td></tr><tr><th><p>Armor Training</p></th><td><p>Light armor</p></td></tr><tr><th><p>Starting Equipment</p></th><td><p><em>Choose A or B:</em> (A) @UUID[Compendium.dnd5e.equipment24.Item.phbarmLeatherArm]{Leather Armor}, 2 @UUID[Compendium.dnd5e.equipment24.Item.phbwepDagger0000]{Daggers}, @UUID[Compendium.mage-hand-press-complete-gunslinger.equipment24.Item.mhpRevolver00000]{Revolver}, 50 @UUID[Compendium.dnd5e.equipment24.Item.phbamoBulletsFir]{Bullets}, @UUID[Compendium.dnd5e.equipment24.Item.phbagExplorersPa]{Explorer’s Pack}, and 11 GP; or (B) 175 GP</p></td></tr></tbody></table><p><span class=\"s1\">Risk is in a Gunslinger’s blood. They are bold renegades, bucking tradition and forging a new path with dangerous and inelegant firearms. Gunslingers are infamous for surviving by their wits and relying on split-second timing and a considerable amount of luck to survive.</span></p><p></p><h2>Becoming a Gunslinger</h2><h3>As a Level 1 Character</h3><ul><li><p><span class=\"s1\">Gain all of the traits in the Core Gunslinger Traits table.</span><span class=\"Apple-converted-space\">\_</span></p></li><li><p><span class=\"s1\">Gain the Gunslinger’s level 1 features, which are listed in the Gunslinger Features table.</span></p></li></ul><h3><span class=\"s1\">As a Multiclass Character</span></h3><ul><li><p class=\"p2\"><span class=\"s1\">Gain the following traits from the Core Gunslinger Traits table: Hit Point Die, and proficiency with Martial Ranged weapons.</span></p></li><li><p class=\"p2\"><span class=\"s1\">Gain the Gunslinger’s level 1 features, which are listed in the Gunslinger Features table.</span></p></li></ul>"
