name: Static Cantrip
type: feat
img: icons/magic/lightning/bolt-strike-hand-gray.webp
system:
  description:
    value: >-
      <p>Whenever you deal Lightning damage to an enemy with a Warmage cantrip, you can sap part of
      the energy into a charge, which clings to your body until the start of your next turn. While
      charged, you can take a Reaction in response to taking damage from a creature you can see
      within 5 feet of you to deal Lightning damage equal to half your Warmage level to the
      creature.</p>
