name: Severe Cantrip
type: feat
img: icons/magic/light/beam-rays-orange-small.webp
system:
  description:
    value: >-
      <p>When a creature rolls a 1 on the d20 for a saving throw against one of your Warmage
      cantrips, it suffers a Critical Failure. It fails the save regardless of its modifiers or the
      spell save DC. If the spell deals damage, you roll all of the spell’s damage dice twice and
      add them together, then add any relevant modifiers. This additional damage applies only to the
      creature that rolled a 1.</p>
