    value: >-
      <p>Once on each of your turns, when you deal Cold damage to a creature with a Warmage cantrip,
      you can numb the target with a frigid blast. The first time the target makes an attack roll
      before the end of its next turn, subtract half your Warmage level
      ([[floor(@classes.warmage.levels / 2)]]) from the attack roll.</p>
