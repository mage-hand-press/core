  description:
    value: >-
      <p>When you finish a Long Rest, you can spend 10 minutes performing a ritual to create a
      Contingent Cantrip. Cast a Warmage cantrip that has a casting time of an action or Bonus
      Action and doesn’t deal damage. The cantrip doesn’t take effect immediately, but instead it
      takes effect the next time you speak a specified command word (no action required). When you
      perform this ritual, choose whether the cantrip targets you, the nearest ally, or the nearest
      enemy. You can’t use Warmage tricks on the cantrip when it comes into effect. You can only
      have one Contingent Cantrip at a time. If you perform this ritual again, the previous
      Contingent Cantrip ends.</p>
