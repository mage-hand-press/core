  description:
    value: >-
      <p>Once on each of your turns, when you deal Force damage with a Warmage cantrip, you can roll
      a d6 on the following table to change the cantrip’s damage type for this casting. You can
      apply tricks to the casting as normal using the new damage type. Additionally, you can apply
      the trick corresponding to the rolled damage type, even if you don’t know the trick.</p><p>You
      can use this trick a number of times equal to your Intelligence modifier (minimum of once).
      You regain all expended uses when you finish a Long
      Rest.</p><p>@Embed[Compendium.mage-hand-press-core.tables.RollTable.mhpPrismaticCant
