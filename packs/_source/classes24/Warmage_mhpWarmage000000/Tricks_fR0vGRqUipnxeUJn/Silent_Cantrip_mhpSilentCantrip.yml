name: Silent Cantrip
type: feat
img: icons/magic/unholy/orb-colllecting-energy-green.webp
system:
  description:
    value: >-
      <p>Once on each of your turns immediately after you deal Thunder damage to an enemy with a
      Warmage cantrip, you can create a 5-foot Emanation of magical silence originating from the
      target, which lasts until the start of your next turn. Any creature or object entirely inside
      the Emanation has Immunity to Thunder damage, and creatures have the &amp;Reference[Deafened]
      condition while entirely inside it. Casting a spell that includes a Verbal component is
      impossible there.</p>
