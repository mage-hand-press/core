  description:
    value: >-
      <p>Once on each of your turns, when you cast a Warmage cantrip that deals Acid, Cold, Fire,
      Force, Lightning, Poison, or Thunder damage, you can change the damage type to
      Radiant.</p><p>When you deal Radiant damage with a Warmage cantrip, you can reroll one of the
      cantrip’s damage dice, and you must use the new roll. The number of damage dice you can reroll
      increases by 1 when you reach Warmage levels 11 (2 dice) and 17 (3 dice).</p>
