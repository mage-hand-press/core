  description:
    value: >-
      <p><em>Prerequisite: Level 10+ Warmage, House of Go</em></p><p>You gain the following
      formation: Capture. You can use this formation when you and three or more allies that don’t
      have the &amp;Reference[Incapacitated apply=false] condition are adjacent to an enemy and
      surround it. You can determine this by placing an imaginary cube around the enemy. If you and
      your allies are adjacent to each side of the cube, the creature is surrounded.</p><p>When you
      activate this formation, the enemy must make a Dexterity saving throw against your spell save
      DC or be enveloped by chains of magical force and have the &amp;Reference[Stunned] condition
      for 1 minute. The Stunned target repeats the save at the end of each of its turns, ending the
      condition on itself and this formation on a success.</p><p>Once you use this trick, you can’t
      use it again until you finish a Short or Long Rest.</p>
