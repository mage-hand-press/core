  description:
    value: >-
      <p>When you cast a Warmage cantrip at a creature and you miss with the attack roll or the
      target succeeds on a saving throw against the cantrip, the target takes the cantrip’s minimum
      amount of damage (if any) but suffers no additional effect from the cantrip. You can apply
      Warmage Edge to this damage (which also deals minimum damage), but you can’t use this damage
      to trigger Warmage Tricks. For example, if you cast
      @UUID[Compendium.mage-hand-press-complete-warmage.spells24.Item.mhpForceDart0000]{Force Dart}
      and miss, you can apply Warmage Edge to deal Force damage equal to 1 plus your Intelligence
      modifier.</p>
