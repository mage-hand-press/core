system:
  description:
    value: >-
      <p>Once per turn when you cast a Warmage cantrip, you can improve the spell, gaining the
      following benefits.</p><p><strong>Intelligence to Damage.</strong> Add your Intelligence
      modifier to one damage roll of the spell if you don’t already add it.</p><p><strong>Improved
      Cantrip Upgrade.</strong> Starting at Warmage level 5, you improve one damage roll of the
      spell, adding extra dice to the damage roll as shown on the Cantrip Bonus Dice column of the
      Warmage Features table.</p>
