name: Warmage
type: class
img: systems/dnd5e/icons/svg/items/class.svg
system:
  description:
    value: >-
      <blockquote><p>The Definitive Strategic Cantrip Class</p></blockquote><table
      class="core-class-traits"><caption>Core Warmage
      Traits</caption><tbody><tr><th><p><strong>Primary
      Ability</strong></p></th><td><p>Intelligence</p></td></tr><tr><th><p><strong>Hit Point
      Die</strong></p></th><td><p>D8 per Warmage level</p></td></tr><tr><th><p><strong>Saving Throw
      Proficiencies</strong></p></th><td><p>Constitution and
      Intelligence</p></td></tr><tr><th><p><strong>Skill
      Proficiencies</strong></p></th><td><p><em>Choose 2:</em> Acrobatics, Animal Handling, Arcana,
      Athletics, History, Investigation, Medicine, Perception, and
      Survival</p></td></tr><tr><th><p><strong>Weapon Proficiencies</strong></p></th><td><p>Simple
      weapons</p></td></tr><tr><th><p><strong>Tool Proficiencies</strong></p></th><td><p>One gaming
      set of your choice</p></td></tr><tr><th><p><strong>Armor
      Training</strong></p></th><td><p>Light armor</p></td></tr><tr><th><p><strong>Starting
      Equipment</strong></p></th><td><p><em>Choose A or B:</em> (A)
      @UUID[Compendium.dnd5e.equipment24.Item.phbarmLeatherArm]{Leather Armor},
      @UUID[Compendium.dnd5e.equipment24.Item.phbwepDagger0000]{Dagger}, Arcane Focus
      (@UUID[Compendium.dnd5e.equipment24.Item.phbafcStaffalsoa]{Staff}), Gaming Set of your choice,
      @UUID[Compendium.dnd5e.equipment24.Item.phbagExplorersPa]{Explorer's Pack}, and [[/award
      22gp]]; or (B) [[/award 50GP]]</p></td></tr></tbody></table><p>Waving a black-and-red
      checkered banner, a dragonborn king charges into the fore. At his sides are Warmages of all
      houses, a chessboard of elite arcanists, poised to turn the tide of battle.</p><p>The
      undisputed masters of cantrips, Warmages turn the most fundamental types of magic into a
      deadly and precise art.</p><h2>Cantrip Masters</h2><p>While other spellcasters aspire to
      grander and more complex spells, Warmages refine and master the most fundamental magic:
      cantrips. Warmages wield their magic in the same way that a warrior uses a sword, bow, or axe—
      as weapons to be perfected, not as an unknowable force to be feared. In contrast to sorcerers
      and wizards, their magic is a trainable skill, one that can be mastered by almost anyone with
      discipline and aptitude. Therefore, Warmages stand among the most fearsome of spellcasters,
      with only the most rudimentary of spells.</p><h2>Strategic Geniuses</h2><p>Warmages have a
      long and storied history as masterful strategists and tacticians, both in grand battles and
      personal skirmishes. If a Warmage is outgunned or outmanned, they’ll try to outthink their
      foes, which works more often than not. Warmages demonstrate an efficient kind of pragmatism,
      owing perhaps to their ability to solve many problems with just a few magical
      tools.</p><h2>Aligned Free Agents</h2><p>While some Warmages are fully self-taught, the
      majority join a house: a loose confederation of Warmages who practice together and share
      secrets of the trade. Houses teach invaluable battlefield strategy, but each individual house
      also touts their own brands of tactics and styles of magical tricks. The House of Knights, for
      example, emphasizes armor and martial prowess, whereas the House of Kings emphasizes
      battlefield strategy.</p><p>se of Kings emphasizes battlefield strategy. By way of metaphor,
      houses that value honor and teamwork above all else brand themselves after games of strategy,
      whereas those who epitomize self-reliance name themselves for games of chance. This division
      in the Warmage houses is representative of a schism that dates back to the earliest Warmage
      masters. Legend has it that the first two masters separated when one decided to found a
      college. The other, out of spite, built a casino outside its grounds.</p><h2>Becoming a
      Warmage…</h2><h3>As a Level 1 Character</h3><ul><li>Gain all of the traits in the Core Warmage
      Traits table.</li><li>Gain the Warmage’s level 1 features, which are listed in the Warmage
      Features table.</li></ul><h3>As a Multiclass Character</h3><ul><li>Gain the Hit Point Die
      trait from the Core Warmage Traits table.</li><li>Gain the Warmage’s level 1 features, which
      are listed in the Warmage Features table.</li></ul>
