  description:
    value: >-
      <p>As an action, this weapon can be fired continuously in a beam, affecting a 120-foot long,
      5-foot wide line in a direction you choose. When a creature enters the area for the first time
      on a turn or starts its turn there, it must make a DC 14 Dexterity saving throw or take 4d6
      radiant damage.</p><p>At the beginning of each of your subsequent turns, roll a d20. On a 5 or
      lower, the weapon overheats and can’t be fired until the end of your next turn. If you roll
      higher than 5, you can use your action to continue firing the beam and can change the
      direction the line faces from you.</p>
